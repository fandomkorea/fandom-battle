<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팬덤배틀 - 아이돌 팬덤 파워 월간 랭킹</title>
  <meta name="description" content="BTS, 블랙핑크, 에스파, 뉴진스! 매달 팬덤 파워 랭킹 투표. 이달 1위 팬덤에게 100만원 상당 포토카드 증정!" />
  <meta property="og:title" content="팬덤배틀 - 팬덤 파워 월간 랭킹" />
  <meta property="og:description" content="이달 1위 팬덤에게 100만원 포토카드 증정! 지금 내 최애 그룹에 투표해봐 💪" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fandomkorea.github.io/fandom-battle/" />
  <meta property="og:image" content="https://fandomkorea.github.io/fandom-battle/og-image.png" />

  <meta name="twitter:image" content="https://fandomkorea.github.io/fandom-battle/og-image.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #0d0d1a;
      --card: #16162a;
      --border: #2a2a4a;
      --primary: #7c4dff;
      --pink: #ff4d8d;
      --blue: #4d9eff;
      --gold: #ffd700;
      --text: #f0f0ff;
      --muted: #8888aa;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 헤더 ── */
    header { text-align: center; padding: 20px 16px 16px; background: linear-gradient(180deg, #1a0a2e 0%, var(--bg) 100%); }
    header h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, var(--pink), var(--primary), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { margin-top: 6px; font-size: 0.9rem; color: var(--muted); }
    .live-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(255,77,141,0.15); border: 1px solid rgba(255,77,141,0.3); font-size: 0.75rem; color: var(--pink); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── 메인 ── */
    main { max-width: 680px; margin: 0 auto; padding: 0 16px 48px; }

    /* ── 섹션 제목 ── */
    .section-title { font-size: 0.82rem; font-weight: 700; color: var(--muted); margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── 빅매치 카드 ── */
    .battle-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .battle-header { text-align: center; padding: 14px 16px 12px; background: linear-gradient(135deg, rgba(255,77,141,0.1), rgba(124,77,255,0.1), rgba(77,158,255,0.1)); border-bottom: 1px solid var(--border); }
    .battle-label { font-size: 0.72rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }
    .countdown { font-size: 1.05rem; font-weight: 700; margin-top: 4px; color: var(--text); }
    .countdown span { color: var(--pink); }
    .total-votes-label { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }


    /* ── 투표 완료 오버레이 ── */
    .voted-overlay { padding: 18px 16px; text-align: center; background: rgba(124,77,255,0.08); border-top: 1px solid var(--border); display: none; }
    .voted-overlay.show { display: block; }
    .voted-msg { font-size: 0.88rem; color: var(--primary); font-weight: 700; }
    .voted-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* ── 광고 자리 ── */
    .ad-slot { background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius); padding: 14px; text-align: center; color: var(--muted); font-size: 0.78rem; min-height: 60px; display: flex; align-items: center; justify-content: center; }

    /* ── 랭킹 ── */
    .ranking-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
    .rank-item:hover { border-color: var(--primary); }
    .rank-item.battle-now { border-color: rgba(255,77,141,0.5); background: rgba(255,77,141,0.05); }
    .rank-num { font-size: 1rem; font-weight: 900; min-width: 28px; text-align: center; }
    .rank-num.gold { color: var(--gold); }
    .rank-num.silver { color: #c0c0c0; }
    .rank-num.bronze { color: #cd7f32; }
    .rank-emoji { font-size: 1.5rem; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-weight: 700; font-size: 0.95rem; }
    .rank-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .rank-votes { font-weight: 700; font-size: 0.92rem; color: var(--primary); white-space: nowrap; }
    .battle-now-tag { font-size: 0.65rem; background: rgba(255,77,141,0.2); color: var(--pink); border-radius: 6px; padding: 2px 6px; font-weight: 700; }

    /* ── 역대 기록 ── */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 0.84rem; }
    .history-week { font-size: 0.7rem; color: var(--muted); min-width: 60px; }
    .history-match { flex: 1; display: flex; align-items: center; gap: 8px; }
    .history-winner { font-weight: 700; color: var(--gold); }
    .history-loser { color: var(--muted); }
    .history-score { font-size: 0.72rem; color: var(--muted); }

    /* ── 공유 버튼 ── */
    .share-row { display: flex; gap: 8px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
    .share-btn { padding: 9px 18px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.82rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .share-btn:hover { border-color: var(--primary); color: var(--primary); }
    .share-btn.kakao { background: #FEE500; color: #3C1E1E; border-color: #FEE500; }
    .share-btn.kakao:hover { background: #f0d800; border-color: #f0d800; color: #3C1E1E; }
    .share-btn.x-btn { background: #000; color: #fff; border-color: #000; }
    .share-btn.x-btn:hover { background: #222; border-color: #222; color: #fff; }
    .share-btn.native { background: var(--primary); color: #fff; border-color: var(--primary); }
    .share-btn.native:hover { background: #6a3de8; border-color: #6a3de8; color: #fff; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a3e; color: var(--text); padding: 12px 24px; border-radius: 12px; font-size: 0.88rem; font-weight: 600; z-index: 9999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; border: 1px solid var(--border); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 0.9rem; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 관리자 패널 ── */
    .admin-panel { background: var(--card); border: 1px solid #ff4d4d55; border-radius: var(--radius); padding: 20px; margin-top: 28px; }
    .admin-panel h3 { color: #ff4d4d; font-size: 0.85rem; margin-bottom: 14px; letter-spacing: 1px; }
    .admin-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .admin-row label { font-size: 0.78rem; color: var(--muted); min-width: 80px; }
    .admin-row select, .admin-row input { padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.82rem; flex: 1; min-width: 120px; }
    .admin-btn { padding: 9px 18px; border-radius: 10px; border: none; background: var(--primary); color: #fff; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; transition: opacity 0.15s; }
    .admin-btn:hover { opacity: 0.85; }
    .admin-btn.danger { background: #cc2222; }


    /* ── 랭킹 더보기 ── */
    .rank-show-more { margin-top: 4px; }
    .show-all-btn { width: 100%; padding: 10px; background: none; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); font-size: 0.8rem; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .show-all-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── 일일 응원 스탬프 ── */
    .cheer-list { display: flex; flex-direction: column; gap: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .cheer-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .cheer-item:last-child { border-bottom: none; }
    .cheer-item.cheered-today { background: rgba(124,77,255,0.07); }
    .cheer-emoji { font-size: 1.2rem; flex-shrink: 0; width: 24px; text-align: center; }
    .cheer-name { font-size: 0.86rem; font-weight: 700; flex: 1; min-width: 0; }
    .cheer-count { font-size: 0.72rem; color: var(--muted); white-space: nowrap; margin-right: 4px; }
    .cheer-btn { padding: 4px 14px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.72rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .cheer-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .cheer-btn.done { background: var(--primary); color: #fff; border-color: var(--primary); cursor: default; }
    .cheer-show-more { padding: 10px 14px; text-align: center; border-top: 1px solid var(--border); }
    .cheer-more-btn { background: none; border: none; color: var(--muted); font-size: 0.78rem; font-family: inherit; cursor: pointer; }
    .cheer-more-btn:hover { color: var(--primary); }

    /* ── 응원 댓글 ── */
    .comment-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .comment-group-sel { padding: 8px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.8rem; outline: none; cursor: pointer; }
    .comment-group-sel:focus { border-color: var(--primary); }
    .comment-input { flex: 1; padding: 8px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.84rem; outline: none; }
    .comment-input:focus { border-color: var(--primary); }
    .comment-submit { padding: 8px 16px; border-radius: 10px; background: var(--primary); color: #fff; border: none; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; flex-shrink: 0; }
    .comment-list { display: flex; flex-direction: column; gap: 6px; }
    .comment-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; gap: 8px; align-items: flex-start; }
    .comment-badge { font-size: 0.63rem; padding: 2px 7px; border-radius: 7px; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-text { font-size: 0.84rem; line-height: 1.4; word-break: break-all; }
    .comment-meta { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }


    /* ── 그룹 전적 뱃지 ── */
    .record-badge { font-size: 0.65rem; background: rgba(255,215,0,0.12); color: var(--gold); border-radius: 6px; padding: 1px 6px; font-weight: 700; margin-left: 4px; }

    /* ── 내 최애 랭킹 하이라이트 ── */
    .rank-item.my-fav-rank { border-color: var(--primary); background: rgba(124,77,255,0.07); }
    .my-fav-star { font-size: 0.65rem; margin-right: 3px; }

    /* ── 내 팀 배틀 참여 배너 ── */
    .my-team-banner { background: linear-gradient(135deg,rgba(124,77,255,0.15),rgba(255,77,141,0.1)); border: 1px solid rgba(124,77,255,0.35); border-radius: 10px; padding: 9px 14px; margin-bottom: 10px; font-size: 0.82rem; font-weight: 700; color: var(--primary); text-align: center; animation: glowPulse 2s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(124,77,255,0); } 50% { box-shadow: 0 0 12px 2px rgba(124,77,255,0.25); } }

    /* ── 댓글 필터 탭 ── */
    .comment-filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .cfilter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .cfilter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ── 투표 0개 빈 바 ── */
    .bar-empty-hint { text-align: center; font-size: 0.74rem; color: var(--muted); padding: 6px 0 2px; }

    /* ── 투표 인증 이미지 ── */
    .proof-canvas { width: 100%; border-radius: 10px; display: block; margin-top: 10px; cursor: pointer; }
    .proof-hint { font-size: 0.68rem; color: var(--muted); text-align: center; margin-top: 4px; }

    /* ── VS 텍스트 ── */
    .vs-text { font-size: 1.3rem; font-weight: 900; color: #7060bb; letter-spacing: -1px; }

    /* ── 상품 배너 ── */
    @keyframes prizeGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); border-color: rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(255,215,0,0.18); border-color: rgba(255,215,0,0.7); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .prize-banner { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(124,77,255,0.12)); border: 1px solid rgba(255,215,0,0.4); border-radius: var(--radius); padding: 20px; text-align: center; margin-top: 16px; animation: prizeGlow 3s ease-in-out infinite; position: relative; overflow: hidden; }
    .prize-banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 40%, rgba(255,215,0,0.08) 50%, transparent 60%); background-size: 200% 100%; animation: shimmer 4s ease-in-out infinite; pointer-events: none; }
    .prize-label { font-size: 0.72rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .prize-amount { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .prize-amount span { color: var(--gold); text-shadow: 0 0 14px rgba(255,215,0,0.6); }
    .prize-sub { font-size: 0.75rem; color: var(--muted); }
    .prize-notice { font-size: 0.78rem; color: var(--gold); margin-top: 8px; font-weight: 600; min-height: 0; }

    /* ── 초기 상태 (투표 없을 때) ── */
    .ranking-empty-hint { text-align: center; padding: 18px 16px 10px; background: rgba(124,77,255,0.06); border: 1px dashed rgba(124,77,255,0.3); border-radius: 12px; margin-bottom: 8px; }
    .ranking-empty-hint p { font-size: 0.84rem; color: var(--muted); margin-top: 4px; }

    /* ── 랭킹 투표 버튼 ── */
    .vote-rank-btn { padding: 5px 13px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.72rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .vote-rank-btn:hover:not(:disabled) { background: var(--primary); color: #fff; border-color: var(--primary); }
    .vote-rank-btn.voted { background: var(--primary); color: #fff; border-color: var(--primary); }
    .vote-rank-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── 랭킹 내 퍼센트 바 ── */
    .rank-pct-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 4px; overflow: hidden; min-width: 40px; margin-top: 5px; }
    .rank-pct-bar { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .rank-vote-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .rank-pct-label { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

    /* ── 랭킹 우측 투표 컬럼 ── */
    .rank-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    /* ── 월 우승 기록 ── */
    .monthly-winner-item { background: linear-gradient(135deg, rgba(255,215,0,0.07), var(--card)); border: 1px solid rgba(255,215,0,0.2); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .mw-month { font-size: 0.7rem; color: var(--muted); min-width: 54px; }
    .mw-info { flex: 1; }
    .mw-winner { font-weight: 900; color: var(--gold); font-size: 0.95rem; }
    .mw-votes { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* ── 내 최애 그룹 ── */
    .fav-chip { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 4px 12px; border-radius: 14px; background: rgba(124,77,255,0.15); border: 1px solid rgba(124,77,255,0.3); font-size: 0.72rem; color: var(--primary); cursor: pointer; transition: background 0.15s; }
    .fav-chip:hover { background: rgba(124,77,255,0.28); }
    .fav-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(135deg,#1a0a2e,#0d0d1a); border-top: 1px solid var(--primary); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .fav-bar-text { font-size: 0.84rem; color: var(--text); }
    .fav-bar-btn { padding: 8px 20px; border-radius: 20px; border: none; background: var(--primary); color: #fff; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .fav-picker { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .fav-picker-sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 680px; padding: 20px 16px 40px; border-top: 1px solid var(--border); animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .fav-picker-title { font-size: 1rem; font-weight: 900; text-align: center; margin-bottom: 16px; }
    .fav-picker-close { float: right; background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; margin-top: -4px; }
    .fav-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: 8px; max-height: 52vh; overflow-y: auto; padding-bottom: 4px; }
    .fav-picker-btn { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.15s; font-family: inherit; color: var(--text); }
    .fav-picker-btn:hover, .fav-picker-btn.selected { border-color: var(--primary); background: rgba(124,77,255,0.12); }
    .fp-emoji { font-size: 1.4rem; display: block; margin-bottom: 4px; }

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function darken(hex) {
  const r = Math.max(0,parseInt(hex.slice(1,3),16)-50), g = Math.max(0,parseInt(hex.slice(3,5),16)-50), b = Math.max(0,parseInt(hex.slice(5,7),16)-50);
  return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
}

function getTodayKey() { return "voted_group_" + new Date().toISOString().slice(0, 10); }

function setMyVote(group) { localStorage.setItem(getTodayKey(), group); }

// ── 월 라벨 & 카운트다운 ──
function setMonthLabel() {
  const el = document.getElementById("monthLabel");
  if (!el) return;
  const now = new Date();
  el.textContent = (now.getMonth() + 1) + "월";
}

function startMonthlyCountdown() {
  if (_cdTimer) clearInterval(_cdTimer);
  function update() {
    const el = document.getElementById("countdownEl");
    if (!el) return;
    const now = new Date();
    const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1, 0, 0, 0);
    const diff = endOfMonth - now;
    if (diff <= 0) { el.innerHTML = "이번 달 투표 마감!"; clearInterval(_cdTimer); return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.innerHTML = `마감까지 ` + (d > 0 ? `<span>${d}일</span> ` : "") + `<span>${h}시간</span> <span>${m}분</span> <span>${s}초</span>`;
  }
  update();
  _cdTimer = setInterval(update, 1000);
}

// ── 투표 후 상단 바 표시 ──
function showMyVotedBar(group) {
  const bar = document.getElementById("myVotedBar");
  const msgEl = document.getElementById("myVotedMsg");
  const subEl = document.getElementById("myVotedSub");
  if (!bar || !msgEl || !subEl || !group) return;
  const meta = GROUP_META[group] || { emoji: "🌟" };
  const rankData = allRankingsData || {};
  const total = Object.values(rankData).reduce((s, v) => s + v, 0);
  const myVotes = rankData[group] || 0;
  const pct = total ? Math.round(myVotes / total * 100) : 0;

  // 현재 순위 계산
  const sorted = Object.entries(rankData).sort((a, b) => b[1] - a[1]);
  const myRank = sorted.findIndex(([g]) => g === group) + 1;

  // 순위별 감성 메시지
  let msg, sub;
  if (myRank === 1 && myVotes > 0) {
    msg = `👑 ${meta.emoji} ${group} 현재 1위! 이 기세 유지하자!`;
    sub = `현재 ${pct}% (${myVotes.toLocaleString()}표) · 친구 불러서 격차 벌리자! 💪`;
  } else if (myRank === 2 || myRank === 3) {
    const leader = sorted[0];
    const gap = leader ? (leader[1] - myVotes) : 0;
    msg = `🔥 ${meta.emoji} ${group} ${myRank}위! 1위까지 ${gap.toLocaleString()}표 차이!`;
    sub = `현재 ${pct}% · 지금 공유해서 역전 노려봐! 📢`;
  } else if (myVotes === 0 || total === 0) {
    msg = `${meta.emoji} ${group} 투표 완료! 첫 표를 던졌어!`;
    sub = `친구한테도 알려서 우리 팀 1위 만들자! 💜`;
  } else {
    msg = `${meta.emoji} ${group} 투표 완료! 현재 ${myRank}위 · ${pct}%`;
    sub = `${myVotes.toLocaleString()}표 · 친구 불러서 순위 올리자! 🚀`;
  }

  // 내일 투표 가능 시간
  const now = new Date(); const next = new Date(now);
  next.setDate(next.getDate() + 1); next.setHours(0, 0, 0, 0);
  const diff = next - now;
  const h = Math.floor(diff / 3600000); const m = Math.floor((diff % 3600000) / 60000);
  sub += `  ⏰ ${h}시간 ${m}분 후 재투표`;

  msgEl.textContent = msg;
  subEl.textContent = sub;
  bar.style.display = "block";
}

function renderRankings(data) {
  const el = document.getElementById("rankingList");
  const myVotedGroup = getMyVote();       // 오늘 투표한 그룹명 or null
  const alreadyVoted = !!myVotedGroup;
  const myFavGroup = getMyFav();

  // 전체 그룹 정렬 (투표수 내림차순)
  const allEntries = ALL_GROUPS.map(g => [g, data[g] || 0]).sort((a, b) => b[1] - a[1]);
  const totalVotes = allEntries.reduce((s, [, v]) => s + v, 0);

  // 총 참여자 수 업데이트
  const tvEl = document.getElementById("totalVotesEl");
  if (tvEl) tvEl.textContent = totalVotes.toLocaleString();

  // 투표 후 상태바 갱신
  if (alreadyVoted) restoreVotedState();

  const withVotes = allEntries.filter(([, v]) => v > 0);
  const zeroVotes = allEntries.filter(([, v]) => v === 0);

  const rankNums = ["", "👑", "🥈", "🥉"];
  const rankClasses = ["", "gold", "silver", "bronze"];

  const renderRow = (group, votes, rank, faded = false) => {
    const meta = GROUP_META[group] || { emoji: "🌟", color: "#7c4dff" };
    const isFav = group === myFavGroup;
    const isVoted = myVotedGroup === group;
    const pct = totalVotes ? Math.round(votes / totalVotes * 100) : 0;
    const rec = groupRecords[group];
    const recBadge = rec && rec.wins ? `<span class="record-badge">🏆 ${rec.wins}회</span>` : "";
    return `
      <div class="rank-item ${isFav ? "my-fav-rank" : ""}" ${faded ? 'style="opacity:0.5"' : ""}>
        <div class="rank-num ${rankClasses[rank] || ""}">${rankNums[rank] || rank}</div>
        <div class="rank-emoji">${meta.emoji}</div>
        <div class="rank-info">
          <div class="rank-name">${isFav ? '<span class="my-fav-star">⭐</span>' : ""}${escHtml(group)}${recBadge}</div>
          <div class="rank-vote-meta">
            <div class="rank-pct-bar-wrap">
              <div class="rank-pct-bar" style="width:${pct}%;background:${meta.color}"></div>
            </div>
            <span class="rank-pct-label">${pct}%</span>
          </div>
        </div>
        <div class="rank-right">
          <div class="rank-votes">${fmtVotes(votes)}</div>
          <button class="vote-rank-btn ${isVoted ? "voted" : ""}"
            onclick="voteForGroup('${escAttr(group)}')"
            ${alreadyVoted ? "disabled" : ""}>
            ${isVoted ? "✅ 투표함" : meta.emoji + " 투표"}
          </button>
        </div>
      </div>`;
  };

  // 댓글 필터 탭에 상위 그룹 반영
  updateCommentFilterTabs(withVotes.slice(0, 3).map(([g]) => g));

  let html = "";

  if (withVotes.length === 0) {
    // 첫 달 / 초기화 직후 — 안내 + 상위 10개만 노출
    const INITIAL_SHOW = 10;
    html = `<div class="ranking-empty-hint">
      <div style="font-size:1.4rem">🎯</div>
      <p>아직 이번 달 투표가 없어요! 첫 번째 투표의 주인공이 되어봐!</p>
    </div>`;
    const initial = allEntries.slice(0, showAllRankings ? allEntries.length : INITIAL_SHOW);
    html += initial.map(([g, v], i) => renderRow(g, v, i + 1)).join("");
    if (!showAllRankings && allEntries.length > INITIAL_SHOW) {
      html += `<div class="rank-show-more">
        <button class="show-all-btn" onclick="toggleAllRankings()">▼ 전체 ${allEntries.length - INITIAL_SHOW}개 그룹 더보기</button>
      </div>`;
    } else if (showAllRankings) {
      html += `<div class="rank-show-more"><button class="show-all-btn" onclick="toggleAllRankings()">▲ 접기</button></div>`;
    }
  } else {
    html = withVotes.map(([g, v], i) => renderRow(g, v, i + 1)).join("");

    if (showAllRankings) {
      html += zeroVotes.map(([g, v], i) => renderRow(g, v, withVotes.length + i + 1, true)).join("");
      if (zeroVotes.length) html += `<div class="rank-show-more"><button class="show-all-btn" onclick="toggleAllRankings()">▲ 접기</button></div>`;
    } else if (zeroVotes.length) {
      html += `<div class="rank-show-more">
        <button class="show-all-btn" onclick="toggleAllRankings()">▼ 아직 투표 없는 그룹 ${zeroVotes.length}개 보기</button>
      </div>`;
    }
  }

  el.innerHTML = html;
}


// ── 챔피언 카드 ──
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function getShareText() {

  const title = `🏆 ${monthStr} 팬덤 파워 랭킹 — 팬덤배틀`;
  const myTag = myGroup ? myGroup.replace(/\s/g, "") : "";
  const text = myGroup

    : `${monthStr} 팬덤 파워 랭킹 진행 중! 100만원 포토카드 내 최애한테! #팬덤배틀 #팬덤파워랭킹`;
  return { title, text, url: SITE_URL };
}

async function shareNative() {
  const { title, text, url } = getShareText();
  if (navigator.share) {
    try {
      await navigator.share({ title, text: text + "\n" + url });
      return;
    } catch (e) { /* 취소 시 무시 */ }
  }
  // fallback: 클립보드 복사
  try {
    await navigator.clipboard.writeText(url);
    showToast("링크 복사됨! 친구한테 공유해줘 💜");
  } catch {
    // 구형 브라우저 fallback
    const ta = document.createElement("textarea");
    ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("링크 복사됨! 💜");
  }
}

function shareKakao() {
  const { text, url } = getShareText();
  // Kakao SDK 없이 카카오톡 URL 스킴 + 웹 fallback
  const kakaoShareUrl = "https://sharer.kakao.com/talk/friends/picker/link?app_key=undefined&validation_action=default&validation_params={}";
  // 실용적 방법: 카카오 오픈채팅 or 링크 공유
  // navigator.share가 있으면 카카오도 목록에 뜸
  if (navigator.share) {
    navigator.share({ title: "팬덤배틀", text: text.replace(/#\S+/g, "").trim(), url });
    return;
  }
  // 없으면 링크 복사
  shareNative();
}

function shareToX() {
  const { text, url } = getShareText();
  const tweetText = text + " 👉 " + url;

}

function renderCheers(data) {
  const wrap = document.getElementById("cheerGrid");

  }
  const myFav = getMyFav();
  // 내 최애 그룹 맨 위 고정
  if (myFav) {
    const idx = sorted.findIndex(([g]) => g === myFav);
    if (idx > 0) { const [item] = sorted.splice(idx, 1); sorted.unshift(item); }
  }

  const visible = showAllCheers ? sorted : sorted.slice(0, CHEER_SHOW);
  const hidden = sorted.length - CHEER_SHOW;

  const rows = visible.map(([g, cnt]) => {
    const meta = GROUP_META[g] || { emoji:"🌟", color:"#7c4dff" };
    const isMine = myCheer === g;
    const isFav = myFav === g;
    return `<div class="cheer-item ${isMine?"cheered-today":""} ${isFav?"my-fav-item":""}">

      <span class="cheer-name ${isFav?"my-fav-label":""}">${escHtml(g)}</span>

    </div>`;
  }).join("");

  const moreBtn = hidden > 0 ? `<div class="cheer-show-more">
    <button class="cheer-more-btn" onclick="toggleAllCheers()">
      ${showAllCheers ? "▲ 접기" : `▼ ${hidden}개 그룹 더보기`}
    </button>
  </div>` : "";

  wrap.innerHTML = rows + moreBtn;
}

function toggleAllCheers() {
  showAllCheers = !showAllCheers;
  db.ref("cheers").once("value", snap => renderCheers(snap.val() || {}));
}

function cheer(group) {
  const key = "cheered_" + getTodayStr();
  if (localStorage.getItem(key)) { showToast("오늘은 이미 응원했어요! 내일 또 와줘 💜"); return; }
  db.ref("cheers/" + group).transaction(c => (c||0)+1);
  localStorage.setItem(key, group);
  showToast("💪 " + group + " 응원 완료!");
}

// ── 응원 댓글 ──
const BAD = ["시발","씨발","병신","개새","지랄","fuck","shit","bitch"];
function filterBad(t) { return BAD.some(w => t.toLowerCase().includes(w)); }
function anonName() {
  const key = "my_anon_name";
  let name = localStorage.getItem(key);
  if (!name) { name = "팬#" + Math.floor(Math.random()*9000+1000); localStorage.setItem(key, name); }
  return name;
}
function canPostComment() {
  const key = "comment_ts";
  const history = JSON.parse(localStorage.getItem(key) || "[]");
  const now = Date.now();
  const recent = history.filter(t => now - t < 60000); // 1분 내
  if (recent.length >= 3) return false;
  recent.push(now);
  localStorage.setItem(key, JSON.stringify(recent));
  return true;
}

function listenComments() {
  db.ref("comments").limitToLast(30).on("value", snap => {
    commentCache = [];
    snap.forEach(c => commentCache.push(c.val()));
    commentCache.reverse();
    renderComments(commentCache);
  });
}

const COMMENT_SHOW = 5;
let showAllComments = false;
let commentFilter = "all";
let commentCache = [];

function renderComments(list) {
  const el = document.getElementById("commentList");
  const filtered = commentFilter === "all" ? list : list.filter(c => c.group === commentFilter);
  if (!filtered.length) {
    el.innerHTML = `<div style="text-align:center;padding:14px;color:var(--muted);font-size:.82rem">${commentFilter === "all" ? "첫 번째 응원 댓글을 남겨봐! 🎤" : `아직 ${escHtml(commentFilter)} 응원 댓글이 없어요!`}</div>`;
    return;
  }
  const visible = showAllComments ? filtered : filtered.slice(0, COMMENT_SHOW);
  const hidden = filtered.length - COMMENT_SHOW;

  const rows = visible.map(c => {
    const meta = GROUP_META[c.group] || { color:"#7c4dff" };
    const ago = relTimeComment(c.time);
    return `<div class="comment-item">
      <span class="comment-badge" style="background:${meta.color}22;color:${meta.color}">${escHtml(c.group)}</span>
      <div class="comment-body">
        <div class="comment-text">${escHtml(c.text)}</div>
        <div class="comment-meta">${escHtml(c.anon)} · ${ago}</div>
      </div>
    </div>`;
  }).join("");

  const moreBtn = !showAllComments && hidden > 0
    ? `<button onclick="showMoreComments()" style="width:100%;padding:9px;background:none;border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-size:0.78rem;font-family:inherit;cursor:pointer;margin-top:4px">▼ 이전 댓글 ${hidden}개 더보기</button>`
    : showAllComments && hidden > 0
    ? `<button onclick="showMoreComments()" style="width:100%;padding:9px;background:none;border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-size:0.78rem;font-family:inherit;cursor:pointer;margin-top:4px">▲ 접기</button>`
    : "";

  el.innerHTML = rows + moreBtn;
}

function filterComments(f) {
  commentFilter = f;
  showAllComments = false;
  document.querySelectorAll(".cfilter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.filter === f);
  });
  renderComments(commentCache);
}

function showMoreComments() {
  showAllComments = !showAllComments;
  renderComments(commentCache);
}

function postComment() {
  const text = document.getElementById("commentInput").value.trim();
  const group = document.getElementById("commentGroup").value;
  if (!text) { showToast("응원 메시지를 입력해줘!"); return; }
  if (filterBad(text)) { showToast("부적절한 표현이 포함되어 있어요"); return; }
  if (!canPostComment()) { showToast("1분에 3개까지만 쓸 수 있어요 ⏳"); return; }
  if (!db) return;
  const ref = db.ref("comments").push();
  ref.set({ text, group, anon: anonName(), time: Date.now() });
  // 30개 초과 시 오래된 것 삭제
  db.ref("comments").once("value", snap => {
    const keys = []; snap.forEach(c => keys.push(c.key));
    if (keys.length > 30) keys.slice(0, keys.length-30).forEach(k => db.ref("comments/"+k).remove());
  });
  document.getElementById("commentInput").value = "";
  showToast("💬 응원 완료!");
}

function relTimeComment(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return "방금";
  if (s<3600) return Math.floor(s/60)+"분 전";
  if (s<86400) return Math.floor(s/3600)+"시간 전";
  return Math.floor(s/86400)+"일 전";
}

// (drawVoteProof 제거됨 — 투표 인증 이미지 기능 삭제)
function drawVoteProof(group) { return; // stub
  const canvas = null; if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const meta = GROUP_META[group] || { color: "#7c4dff", emoji: "🌟" };
  const c2 = darken(meta.color);

  // 배경 그라디언트
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#0d0d1a");
  bg.addColorStop(0.6, meta.color + "33");
  bg.addColorStop(1, c2 + "55");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 장식 원
  ctx.beginPath(); ctx.arc(W - 60, 60, 90, 0, Math.PI * 2);
  ctx.fillStyle = meta.color + "18"; ctx.fill();
  ctx.beginPath(); ctx.arc(60, H - 40, 70, 0, Math.PI * 2);
  ctx.fillStyle = meta.color + "12"; ctx.fill();

  // 상단 배지
  ctx.fillStyle = meta.color + "33";
  roundRect(ctx, W/2 - 80, 18, 160, 28, 14); ctx.fill();
  ctx.fillStyle = meta.color; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
  ctx.fillText("✅  투표 인증", W / 2, 37);

  // 이모지
  ctx.font = "64px sans-serif";
  ctx.fillText(meta.emoji, W / 2, 130);

  // 메인 텍스트
  ctx.fillStyle = "#ffffff"; ctx.font = "bold 24px 'Noto Sans KR', sans-serif";
  ctx.fillText("나는 오늘", W / 2, 170);
  ctx.fillStyle = meta.color; ctx.font = "bold 28px 'Noto Sans KR', sans-serif";
  ctx.fillText(group + " 에 투표했어!", W / 2, 206);

  // 현재 투표 현황
  if (battleData) {
    const vA = battleData.votesA || 0, vB = battleData.votesB || 0;
    const tot = vA + vB;
    const pA = tot ? Math.round(vA / tot * 100) : 50;
    const pB = 100 - pA;
    const myPct = group === battleData.groupA ? pA : pB;
    const otherPct = 100 - myPct;
    const otherGroup = group === battleData.groupA ? battleData.groupB : battleData.groupA;
    // 작은 바 배경
    const bx = W * 0.15, bw = W * 0.7, by = 228, bh = 8;
    ctx.fillStyle = "#ffffff18"; roundRect(ctx, bx, by, bw, bh, 4); ctx.fill();
    const bwMy = Math.round(bw * myPct / 100);
    if (bwMy > 0) { ctx.fillStyle = meta.color; roundRect(ctx, bx, by, bwMy, bh, 4); ctx.fill(); }
    ctx.fillStyle = "#ffffff88"; ctx.font = "bold 13px sans-serif";
    ctx.fillText(`${group} ${myPct}%  vs  ${otherGroup} ${otherPct}%`, W / 2, 254);
  }

  // 날짜
  const today = new Date().toLocaleDateString("ko-KR", { month: "long", day: "numeric" });
  ctx.fillStyle = "#ffffff55"; ctx.font = "12px sans-serif";
  ctx.fillText(today + "  ·  팬덤배틀", W / 2, 272);

  // URL
  ctx.fillStyle = "#ffffff2a"; ctx.font = "11px sans-serif";
  ctx.fillText("fandomkorea.github.io/fandom-battle", W / 2, 291);
}

// (drawVoteProof / roundRect / downloadVoteProof / renderNextPrediction 제거됨)

// ── 그룹 역대 전적 ──
let groupRecords = {};
function loadGroupRecords() {
  db.ref("group_records").once("value", snap => {
    groupRecords = snap.val() || {};
    if (allRankingsData) renderRankings(allRankingsData);
  });
}

// ── 내 최애 그룹 ──
function getMyFav() { return localStorage.getItem("my_fav_group"); }
function setMyFav(g) {
  localStorage.setItem("my_fav_group", g);
  renderFavChip();
  document.getElementById("favBar")?.remove();
  // 댓글 셀렉트 자동 선택
  const sel = document.getElementById("commentGroup");
  if (sel && g) sel.value = g;
  // 응원 목록 내 최애 위로
  db.ref("cheers").once("value", snap => renderCheers(snap.val() || {}));
}

function renderFavChip() {
  const area = document.getElementById("favChipArea");
  if (!area) return;
  const fav = getMyFav();
  if (!fav) { area.innerHTML = ""; return; }
  const meta = GROUP_META[fav] || { emoji:"🌟" };
  area.innerHTML = `<div class="fav-chip" onclick="openFavPicker()" title="클릭해서 변경">${meta.emoji} ${escHtml(fav)} ✏️</div>`;
}

function showFavBar() {
  if (getMyFav() || document.getElementById("favBar")) return;
  const bar = document.createElement("div");
  bar.id = "favBar";
  bar.className = "fav-bar";
  bar.innerHTML = `<span class="fav-bar-text">💜 내 최애 그룹을 설정하면 더 편해요!</span><button class="fav-bar-btn" onclick="openFavPicker()">팬덤 선택</button>`;
  document.body.appendChild(bar);
}

function openFavPicker() {
  if (document.getElementById("favPicker")) return;
  const myFav = getMyFav();
  const overlay = document.createElement("div");
  overlay.id = "favPicker";
  overlay.className = "fav-picker";
  overlay.onclick = e => { if (e.target === overlay) closeFavPicker(); };
  const grid = ALL_GROUPS.map(g => {
    const meta = GROUP_META[g] || { emoji:"🌟" };
    return `<button class="fav-picker-btn ${myFav===g?"selected":""}" onclick="pickFav('${escAttr(g)}')">
      <span class="fp-emoji">${meta.emoji}</span>
      <span class="fp-name">${escHtml(g)}</span>
    </button>`;
  }).join("");
  overlay.innerHTML = `<div class="fav-picker-sheet">
    <div class="fav-picker-title">💜 내 최애 그룹은?<button class="fav-picker-close" onclick="closeFavPicker()">✕</button></div>
    <div class="fav-picker-grid">${grid}</div>
  </div>`;
  document.body.appendChild(overlay);
}

function closeFavPicker() { document.getElementById("favPicker")?.remove(); }

function pickFav(group) {
  setMyFav(group);
  closeFavPicker();
  showToast(`💜 ${group} 팬으로 설정됐어!`);
}

// ── 다음 투표까지 시간 ──
function nextVoteCountdown() {
  const now = new Date();
  const next = new Date(now);
  next.setDate(next.getDate() + 1);
  next.setHours(0, 0, 0, 0);
  const diff = next - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `⏰ ${h}시간 ${m}분 후 투표 가능`;
}

// ── 유틸 ──
function fmtVotes(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, "") + "만";
  return n.toLocaleString();
}
function escHtml(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg;
  t.classList.add("show"); clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove("show"), 2500);
}

init();
