<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팬덤배틀 - 아이돌 팬덤 파워 월간 랭킹</title>
  <meta name="description" content="BTS, 블랙핑크, 에스파, 뉴진스! 매달 팬덤 파워 랭킹 투표. 이달 1위 팬덤에게 100만원 상당 포토카드 증정!" />
  <meta property="og:title" content="팬덤배틀 - 팬덤 파워 월간 랭킹" />

  <meta property="og:type" content="website" />

  <meta name="twitter:title" content="팬덤배틀 - 팬덤 파워 월간 랭킹" />
  <meta name="twitter:description" content="이달 1위 팬덤에게 100만원 포토카드 증정! 지금 내 최애 그룹에 투표해봐 💪" />
  <meta name="twitter:image" content="https://fandomkorea.github.io/fandom-battle/og-image.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- Font Awesome (Google/Kakao 로고) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --bg: #0f1019;
      --card: #1a1b2e;
      --border: #2d2e42;
      --primary: #7c4dff;
      --pink: #ff4d8d;
      --blue: #4d9eff;
      --gold: #ffd700;
      --text: #f5f1ff;
      --muted: #9999bb;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 헤더 ── */
    header { text-align: center; padding: 20px 16px 16px; background: linear-gradient(180deg, #1a0a2e 0%, var(--bg) 100%); }
    header h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, var(--pink), var(--primary), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { margin-top: 6px; font-size: 0.9rem; color: var(--muted); }
    .live-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(255,77,141,0.15); border: 1px solid rgba(255,77,141,0.3); font-size: 0.75rem; color: var(--pink); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── 인증 컨테이너 ── */
    #authContainer { padding: 12px 16px; background: linear-gradient(135deg, rgba(124,77,255,0.08), rgba(255,77,141,0.04)); border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
    #authContainer button { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-weight: 600; font-size: 0.78rem; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    #authContainer button:hover { border-color: var(--primary); background: rgba(124,77,255,0.1); }
    #authLoggedIn { display: flex; gap: 12px; align-items: center; }
    #userDisplayName { font-size: 0.8rem; color: var(--text); font-weight: 600; }
    #authLoggedIn button { background: rgba(255,77,141,0.15); border-color: var(--pink); color: var(--pink); }
    #authLoggedIn button:hover { background: rgba(255,77,141,0.25); }

    /* ── 인증 설정 모달 ── */
    .auth-setup-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .auth-setup-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .auth-setup-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; text-align: center; }
    .auth-setup-section { margin-bottom: 20px; }
    .auth-setup-label { font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; display: block; }
    .auth-setup-input { width: 100%; padding: 10px 12px; background: rgba(124,77,255,0.1); border: 1px solid var(--primary); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
    .auth-setup-input:focus { outline: none; border-color: var(--pink); background: rgba(255,77,141,0.1); }
    #authFandomSearch { margin-bottom: 12px; }
    .auth-fandom-search-hint { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
    .auth-fandom-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 220px; overflow-y: auto; }
    .auth-fandom-grid.empty { display: flex; align-items: center; justify-content: center; height: 100px; }
    .auth-fandom-empty-msg { text-align: center; color: var(--muted); font-size: 0.8rem; }
    .auth-fandom-highlight { color: var(--pink); font-weight: 700; }
    .auth-fandom-btn { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(124,77,255,0.05); color: var(--text); font-family: inherit; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .auth-fandom-btn:hover { border-color: var(--primary); }
    .auth-fandom-btn.selected { background: var(--primary); border-color: var(--primary); }
    .auth-setup-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .auth-setup-buttons button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .auth-setup-btn-ok { background: var(--primary); color: #fff; }
    .auth-setup-btn-ok:hover { background: #6a3de8; }
    .auth-setup-btn-skip { background: rgba(124,77,255,0.1); color: var(--primary); border: 1px solid var(--primary); }
    .auth-setup-btn-skip:hover { background: rgba(124,77,255,0.2); }

    @media (max-width: 480px) {
      #authContainer { padding: 10px 12px; gap: 6px; }
      #authContainer button { padding: 8px 12px; font-size: 0.7rem; }
      #userDisplayName { font-size: 0.7rem; }
      .auth-setup-box { padding: 20px; }
      .auth-fandom-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── 메인 ── */
    main { max-width: 680px; margin: 0 auto; padding: 0 16px 48px; }

    /* ── 섹션 제목 ── */
    .section-title { font-size: 0.82rem; font-weight: 700; color: var(--muted); margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── 빅매치 카드 ── */
    .battle-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .battle-header { text-align: center; padding: 14px 16px 12px; background: linear-gradient(135deg, rgba(255,77,141,0.1), rgba(124,77,255,0.1), rgba(77,158,255,0.1)); border-bottom: 1px solid var(--border); }
    .battle-label { font-size: 0.72rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }
    .countdown { font-size: 1.05rem; font-weight: 700; margin-top: 4px; color: var(--text); }
    .countdown span { color: var(--pink); }
    .total-votes-label { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }


    /* ── 투표 완료 오버레이 ── */
    .voted-overlay { padding: 18px 16px; text-align: center; background: rgba(124,77,255,0.08); border-top: 1px solid var(--border); display: none; }
    .voted-overlay.show { display: block; }
    .voted-msg { font-size: 0.88rem; color: var(--primary); font-weight: 700; line-height: 1.4; }
    .voted-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    @media (max-width: 480px) {
      .voted-overlay { padding: 10px 10px; }
      .voted-msg { font-size: 0.8rem; line-height: 1.2; margin-bottom: 2px; }
      .voted-sub { font-size: 0.7rem; margin-top: 2px; line-height: 1.3; }
      .share-row { margin-top: 4px; gap: 6px; }
      .share-btn { padding: 8px 14px; font-size: 0.75rem; }

      /* 광고 버튼 */
      #adVoteCta { margin-bottom: 8px !important; padding: 10px !important; font-size: 0.8rem !important; }
    }

    /* ── 광고 자리 ── */
    .ad-slot { background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius); padding: 14px; text-align: center; color: var(--muted); font-size: 0.78rem; min-height: 60px; display: flex; align-items: center; justify-content: center; }

    /* ── 랭킹 ── */
    .ranking-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
    .rank-item:hover { border-color: var(--primary); }
    .rank-item.battle-now { border-color: rgba(255,77,141,0.5); background: rgba(255,77,141,0.05); }
    .rank-num { font-size: 1rem; font-weight: 900; min-width: 28px; text-align: center; }
    .rank-num.gold { color: var(--gold); }
    .rank-num.silver { color: #c0c0c0; }
    .rank-num.bronze { color: #cd7f32; }
    .rank-emoji { font-size: 1.5rem; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-weight: 700; font-size: 0.95rem; word-break: break-word; line-height: 1.3; }
    .rank-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .rank-votes { font-weight: 700; font-size: 0.92rem; color: var(--primary); white-space: nowrap; }
    .battle-now-tag { font-size: 0.65rem; background: rgba(255,77,141,0.2); color: var(--pink); border-radius: 6px; padding: 2px 6px; font-weight: 700; }

    /* ── 역대 기록 ── */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 0.84rem; }
    .history-week { font-size: 0.7rem; color: var(--muted); min-width: 60px; }
    .history-match { flex: 1; display: flex; align-items: center; gap: 8px; }
    .history-winner { font-weight: 700; color: var(--gold); }
    .history-loser { color: var(--muted); }
    .history-score { font-size: 0.72rem; color: var(--muted); }

    /* ── 공유 버튼 ── */
    .share-row { display: flex; gap: 8px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
    .share-btn { padding: 9px 18px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.82rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .share-btn:hover { border-color: var(--primary); color: var(--primary); }
    .share-btn.kakao { background: #FEE500; color: #3C1E1E; border-color: #FEE500; }
    .share-btn.kakao:hover { background: #f0d800; border-color: #f0d800; color: #3C1E1E; }
    .share-btn.x-btn { background: #000; color: #fff; border-color: #000; }
    .share-btn.x-btn:hover { background: #222; border-color: #222; color: #fff; }
    .share-btn.native { background: var(--primary); color: #fff; border-color: var(--primary); }
    .share-btn.native:hover { background: #6a3de8; border-color: #6a3de8; color: #fff; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a3e; color: var(--text); padding: 12px 24px; border-radius: 12px; font-size: 0.88rem; font-weight: 600; z-index: 9999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; border: 1px solid var(--border); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 0.9rem; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 관리자 패널 ── */
    .admin-panel { background: var(--card); border: 1px solid #ff4d4d55; border-radius: var(--radius); padding: 20px; margin-top: 28px; }
    .admin-panel h3 { color: #ff4d4d; font-size: 0.85rem; margin-bottom: 14px; letter-spacing: 1px; }
    .admin-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .admin-row label { font-size: 0.78rem; color: var(--muted); min-width: 80px; }
    .admin-row select, .admin-row input { padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.82rem; flex: 1; min-width: 120px; }
    .admin-btn { padding: 9px 18px; border-radius: 10px; border: none; background: var(--primary); color: #fff; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; transition: opacity 0.15s; }
    .admin-btn:hover { opacity: 0.85; }
    .admin-btn.danger { background: #cc2222; }


    /* ── 랭킹 더보기 ── */
    .rank-show-more { margin-top: 4px; }
    .show-all-btn { width: 100%; padding: 10px; background: none; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); font-size: 0.8rem; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .show-all-btn:hover { border-color: var(--primary); color: var(--primary); }




    /* ── 그룹 전적 뱃지 ── */
    .record-badge { font-size: 0.65rem; background: rgba(255,215,0,0.12); color: var(--gold); border-radius: 6px; padding: 1px 6px; font-weight: 700; margin-left: 4px; }

    /* ── 내 최애 랭킹 하이라이트 ── */
    .rank-item.my-fav-rank { border-color: var(--primary); background: rgba(124,77,255,0.07); }
    .my-fav-star { font-size: 0.65rem; margin-right: 3px; }

    /* ── 내가 투표한 팀 강조 ── */
    .rank-item.my-voted { border-color: var(--primary); background: rgba(124,77,255,0.12); border-width: 2px; }
    .rank-item.my-voted .rank-name { color: var(--primary); font-weight: 900; }
    .my-voted-badge { display: inline-block; font-size: 0.6rem; background: var(--primary); color: #fff; border-radius: 10px; padding: 2px 8px; margin-left: 5px; font-weight: 700; animation: pulse 1.5s infinite; }

    /* ── 내 팀 배틀 참여 배너 ── */
    .my-team-banner { background: linear-gradient(135deg,rgba(124,77,255,0.15),rgba(255,77,141,0.1)); border: 1px solid rgba(124,77,255,0.35); border-radius: 10px; padding: 9px 14px; margin-bottom: 10px; font-size: 0.82rem; font-weight: 700; color: var(--primary); text-align: center; animation: glowPulse 2s ease-in-out infinite; }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(124,77,255,0); } 50% { box-shadow: 0 0 12px 2px rgba(124,77,255,0.25); } }

    /* ── 댓글 필터 탭 ── */
    /* ── 투표 0개 빈 바 ── */
    .bar-empty-hint { text-align: center; font-size: 0.74rem; color: var(--muted); padding: 6px 0 2px; }

    /* ── 투표 인증 이미지 ── */
    .proof-canvas { width: 100%; border-radius: 10px; display: block; margin-top: 10px; cursor: pointer; }
    .proof-hint { font-size: 0.68rem; color: var(--muted); text-align: center; margin-top: 4px; }

    /* ── VS 텍스트 ── */
    .vs-text { font-size: 1.3rem; font-weight: 900; color: #7060bb; letter-spacing: -1px; }

    /* ── 상품 배너 ── */
    @keyframes prizeGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); border-color: rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 20px 4px rgba(255,215,0,0.18); border-color: rgba(255,215,0,0.7); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    .prize-banner { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(124,77,255,0.12)); border: 1px solid rgba(255,215,0,0.4); border-radius: var(--radius); padding: 20px; text-align: center; margin-top: 16px; animation: prizeGlow 3s ease-in-out infinite; position: relative; overflow: hidden; }
    .prize-banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(105deg, transparent 40%, rgba(255,215,0,0.08) 50%, transparent 60%); background-size: 200% 100%; animation: shimmer 4s ease-in-out infinite; pointer-events: none; }
    .prize-label { font-size: 0.72rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .prize-amount { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .prize-amount span { color: var(--gold); text-shadow: 0 0 14px rgba(255,215,0,0.6); }
    .prize-sub { font-size: 0.75rem; color: var(--muted); }
    .prize-notice { font-size: 0.78rem; color: var(--gold); margin-top: 8px; font-weight: 600; min-height: 0; }

    /* ── 초기 상태 (투표 없을 때) ── */
    .ranking-empty-hint { text-align: center; padding: 18px 16px 10px; background: rgba(124,77,255,0.06); border: 1px dashed rgba(124,77,255,0.3); border-radius: 12px; margin-bottom: 8px; }
    .ranking-empty-hint p { font-size: 0.84rem; color: var(--muted); margin-top: 4px; }

    /* ── 랭킹 투표 버튼 ── */
    .vote-rank-btn { padding: 7px 15px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; min-width: 70px; text-align: center; }
    .vote-rank-btn:hover:not(:disabled) { background: var(--primary); color: #fff; border-color: var(--primary); transform: scale(1.08); }
    .vote-rank-btn:active:not(:disabled) { transform: scale(0.95); }
    .vote-rank-btn.voted { background: var(--primary); color: #fff; border-color: var(--primary); }
    .vote-rank-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── 랭킹 내 퍼센트 바 ── */
    .rank-pct-bar-wrap { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; min-width: 40px; margin-top: 5px; }
    .rank-pct-bar { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .rank-vote-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .rank-pct-label { font-size: 0.68rem; color: var(--muted); white-space: nowrap; }

    /* ── 랭킹 우측 투표 컬럼 ── */
    .rank-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    /* ── 월 우승 기록 ── */
    .monthly-winner-item { background: linear-gradient(135deg, rgba(255,215,0,0.07), var(--card)); border: 1px solid rgba(255,215,0,0.2); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .mw-month { font-size: 0.7rem; color: var(--muted); min-width: 54px; }
    .mw-info { flex: 1; }
    .mw-winner { font-weight: 900; color: var(--gold); font-size: 0.95rem; }
    .mw-votes { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* ── 내 최애 그룹 ── */

<header>

<main>

// Google 로그인
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  // 기존 로그인된 계정이 자동으로 나타나도록 설정
  provider.setCustomParameters({
    prompt: 'select_account' // 계정 선택 화면 표시 (기존 계정 포함)
  });
  firebase.auth().signInWithPopup(provider)
    .then(result => {
      currentUser = result.user;
      isLoggedIn = true;
      syncVotesWithServer();
      // 모달 띄우기 전에 기존 닉네임 확인
      loadAuthUserData(() => {
        if (!currentUser.customNickname) {
          showAuthSetupModal();
        } else {
          updateAuthUI();
          showToast(`👤 ${currentUser.customNickname}님 환영합니다!`);

          if (window.pendingVoteGroup) {
            const group = window.pendingVoteGroup;
            window.pendingVoteGroup = null;
            setTimeout(() => voteForGroup(group), 500);
          }
        }
      });
    })
    .catch(error => {
      showToast("Google 로그인 실패: " + error.message);

    });
}

// ── Firebase에서 광고 투표권 로드 ──
async function loadUserAdVotes() {
  if (!currentUser) return;

  try {
    const snap = await db.ref(`users/${currentUser.uid}/pendingAdVotes`).once("value");
    pendingAdVotes = snap.val() || 0;

    // ★ 광고 시청 횟수 로드 (일일 리셋)
    const today = getTodayKey();
    const adWatchSnap = await db.ref(`users/${currentUser.uid}/ad_watch_count_${today}`).once("value");
    adWatchCount = adWatchSnap.val() || 0;

    // ★ 최애팬덤 로드 (다른 기기에서 복구)
    const favSnap = await db.ref(`users/${currentUser.uid}/myFav`).once("value");
    if (favSnap.exists()) {
      localStorage.setItem("my_fav_group", favSnap.val());
    }

    // 오늘의 투표 정보도 함께 로드
    await loadTodayVotesFromFirebase();

    // ★ 사용자 닉네임/팬덤 로드
    await new Promise((resolve) => loadAuthUserData(resolve));

    updateFavBar(); // 로드 후 팬덤 선택 바 업데이트
    updateAuthUI(); // ★ 닉네임 표시 업데이트

    // ★ 투표권 로드 후 랭킹 다시 렌더링 (버튼 활성화 상태 업데이트)
    if (allRankingsData) {
      renderRankings(allRankingsData);
    }
  } catch (e) {
    console.error("광고 투표권 로드 실패:", e);
    pendingAdVotes = 0;
    adWatchCount = 0;
    cachedTodayFreeVote = null;
    cachedTodayAdVotes = 0;
  }
}

      }

  } else {

}

  const today = getTodayKey();

// 투표 기록 저장
async function recordUserVote(group) {
  if (isLoggedIn && currentUser) {
    const today = getTodayKey();
    const record = {
      group: group,
      timestamp: Date.now(),
      email: currentUser.email
    };
    // Firebase에 저장
    await db.ref(`votes/${today}/${currentUser.uid}`).set(record);
    // localStorage에도 저장 (UI와 getTodayVoteCount()에서 사용)
    cachedTodayFreeVote = group; // Firebase에 저장됨
  } else {
    // 익명: localStorage 사용
    cachedTodayFreeVote = group; // Firebase에 저장됨
  }
}

// localStorage 투표를 서버로 동기화 (로그인 시)
async function syncVotesWithServer() {
  if (!isLoggedIn || !currentUser) return;

  const history = JSON.parse(localStorage.getItem("my_voting_history") || "{}");
  const promises = [];

  Object.entries(history).forEach(([date, group]) => {
    promises.push(
      db.ref(`votes/${date}/${currentUser.uid}`).set({
        group: group,
        timestamp: Date.now(),
        migrated: true
      }).catch(err => console.log("Sync error for", date, err))
    );
  });

  await Promise.all(promises).catch(err => console.error("Sync failed:", err));
}

// Firebase에서 사용자 데이터 로드
function loadAuthUserData(callback) {
  if (!currentUser || !db) {
    if (callback) callback();
    return;
  }

  db.ref(`users/${currentUser.uid}`).once("value", snap => {
    if (snap.exists()) {
      const data = snap.val();
      currentUser.customNickname = data.nickname || null;
      currentUser.customFandom = data.fandom || null;
    }
    if (callback) callback();
  }).catch(err => {

// 팬덤 검색 필터링
function filterAuthFandoms(query) {
  const searchInput = query.toLowerCase().trim();

  let filtered;
  if (!searchInput) {
    filtered = ALL_GROUPS;
  } else {
    filtered = ALL_GROUPS.filter(group => {
      const groupLower = group.toLowerCase();
      // 이름에 포함되거나 시작하거나, 한 글자만 입력했을 때만 첫 글자 비교
      return groupLower.includes(searchInput) ||
             groupLower.startsWith(searchInput) ||
             (searchInput.length === 1 && group.charAt(0).toLowerCase() === searchInput.charAt(0));
    });
  }

  renderAuthFandomGrid(filtered, searchInput);
}

// 팬덤 그리드 렌더링
function renderAuthFandomGrid(groups, highlight = "") {
  const grid = document.getElementById("authFandomGrid");
  if (!grid) return;

  if (groups.length === 0) {
    grid.className = "auth-fandom-grid empty";
    grid.innerHTML = `<div class="auth-fandom-empty-msg">검색 결과가 없어요 😢</div>`;
    return;
  }

  grid.className = "auth-fandom-grid";
  grid.innerHTML = groups.map(g => {
    const meta = GROUP_META[g] || { emoji: "🌟" };
    const displayName = highlight ? highlightSearchText(g, highlight) : escHtml(g);
    return `<button class="auth-fandom-btn" onclick="selectAuthFandom('${escAttr(g)}')" data-fandom="${escAttr(g)}">
      ${meta.emoji} <span>${displayName}</span>
    </button>`;
  }).join("");
}

// 검색어 하이라이팅
function highlightSearchText(text, search) {
  if (!search) return escHtml(text);

  const regex = new RegExp(`(${search})`, "gi");
  return escHtml(text).replace(regex, '<span class="auth-fandom-highlight">$1</span>');
}

// ── 투표 제한 (하루 최대: 무료 1표 + 광고 10표 = 11표) ──
const MAX_FREE_VOTES_PER_DAY = 1;
const MAX_AD_VOTES_PER_DAY = 10;
const MAX_TOTAL_VOTES_PER_DAY = 11; // 무료(1) + 광고(10) 합계
let pendingAdVotes = 0; // 광고로부터 얻은 미사용 투표권 개수
let adWatchCount = 0; // ★ 광고 시청 횟수 (0-10)

function getTodayKey()      { return new Date().toISOString().slice(0, 10); }

// ── Firebase 캐시 변수 ──
let cachedTodayFreeVote = null;   // 오늘 무료 투표한 그룹 or null
let cachedTodayAdVotes = 0;       // 오늘 사용한 광고 투표 개수 (0-10)

// ── 투표 상태 함수들 (Firebase 기반) ──
function getTodayFreeVoteCount()  { return cachedTodayFreeVote ? 1 : 0; } // 무료 투표 사용 여부 (0 or 1)
function getTodayAdVoteCount()    { return cachedTodayAdVotes; } // 광고 투표 사용 개수 (0-10)
function getTodayVoteCount()      { return getTodayFreeVoteCount() + getTodayAdVoteCount(); } // 총 투표 개수 (0-11)
function canUseFreeVote()         { return getTodayFreeVoteCount() === 0; } // 무료 투표 가능 여부
function canUseAdVotes()          { return getTodayAdVoteCount() < MAX_AD_VOTES_PER_DAY && pendingAdVotes > 0; } // 광고 투표 가능 여부
function getRemainingAdVotes()    { return MAX_AD_VOTES_PER_DAY - getTodayAdVoteCount(); } // 남은 광고 투표권 개수

// ── Firebase에서 오늘의 투표 데이터 로드 ──
async function loadTodayVotesFromFirebase() {
  if (!isLoggedIn || !currentUser || !db) return;

  const today = getTodayKey();

  // 1. 무료 투표 확인 (votes/{date}/{uid} 존재하는지 확인)
  try {
    const freeVoteSnap = await db.ref(`votes/${today}/${currentUser.uid}`).once("value");
    cachedTodayFreeVote = freeVoteSnap.exists() ? freeVoteSnap.val().group : null;
  } catch (e) {
    console.error("무료 투표 로드 실패:", e);
  }

  // 2. 광고 투표 개수 확인 (users/{uid}/ad_votes_used_{date})
  try {
    const adVotesSnap = await db.ref(`users/${currentUser.uid}/ad_votes_used_${today}`).once("value");
    cachedTodayAdVotes = adVotesSnap.val() || 0;
  } catch (e) {
    console.error("광고 투표 로드 실패:", e);
    cachedTodayAdVotes = 0;
  }

  console.log(`오늘 투표 로드: 무료=${cachedTodayFreeVote}, 광고=${cachedTodayAdVotes}`);
}

// ── 투표 스트릭 (연속 투표 일수) ──
function updateVotingStreak() {
  const today = getTodayKey();
  const lastVoteDate = localStorage.getItem("last_vote_date");
  const currentStreak = parseInt(localStorage.getItem("voting_streak") || "0", 10);

  if (lastVoteDate === today) {
    // 오늘 이미 투표함
    return currentStreak;
  }

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = yesterday.toISOString().slice(0, 10);

  let newStreak = 0;
  if (lastVoteDate === yesterdayKey) {
    // 어제 투표했음 → 스트릭 계속
    newStreak = currentStreak + 1;
  } else {
    // 어제 투표 안함 → 스트릭 초기화
    newStreak = 1;
  }

  localStorage.setItem("voting_streak", newStreak);
  localStorage.setItem("last_vote_date", today);
  return newStreak;
}

function getVotingStreak() {
  const today = getTodayKey();
  const lastVoteDate = localStorage.getItem("last_vote_date");
  const streak = parseInt(localStorage.getItem("voting_streak") || "0", 10);
  // 오늘 투표하지 않았고 어제도 투표하지 않았으면 스트릭 0
  if (lastVoteDate !== today && lastVoteDate !== new Date(Date.now() - 86400000).toISOString().slice(0, 10)) {
    return 0;
  }
  return streak;
}

// ── 월 라벨 & 카운트다운 ──

function startMonthlyCountdown() {
  if (_cdTimer) clearInterval(_cdTimer);
  function update() {
    const el = document.getElementById("countdownEl");
    if (!el) return;
    const now = new Date();
    const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1, 0, 0, 0);
    const diff = endOfMonth - now;
    if (diff <= 0) { el.innerHTML = "이번 달 투표 마감!"; clearInterval(_cdTimer); return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    el.innerHTML = `마감까지 ` + (d > 0 ? `<span>${d}일</span> ` : "") + `<span>${h}시간</span> <span>${m}분</span> <span>${s}초</span>`;
  }
  update();
  _cdTimer = setInterval(update, 1000);
}

// ── 투표 (그룹 선택) ──
async function voteForGroup(group) {
  if (!db) return;
  const meta = GROUP_META[group] || { emoji: "🌟" };

  // 비로그인 상태면 로그인 모달 띄우기
  if (!isLoggedIn) {
    showVoteLoginModal(group);
    return;
  }

  // ★ 무료 투표가 아직 남아있으면 먼저 무료 투표 (우선순위 1)
  if (canUseFreeVote()) {
    try {
      // Firebase에 무료 투표 기록
      await recordUserVote(group);

      // 캐시 업데이트
      cachedTodayFreeVote = group;

      recordVote(group); // 로컬 히스토리 기록
      addActivity(group);
      const streak = updateVotingStreak();
      const streakMsg = streak > 1 ? `🔥 ${streak}일 연속 투표 중!` : "";
      showToast(meta.emoji + " " + group + " 무료 투표 완료! 1등을 향해!" + (streakMsg ? " " + streakMsg : ""));
      showConfetti(meta.color);

      // Firebase에 투표 기록 (비동기)
      db.ref("rankings/" + group).transaction(cur => (cur || 0) + 1);

      renderMyVotingHistory();
      showMyVotedBar(group);
      updateFavBar(); // 광고 바 업데이트
      updateAuthUI(); // ★ 닉네임 옆 투표권 정보 업데이트

      // 투표 가이드 배너 숨기기
      const banner = document.getElementById("voteGuideBanner");
      if (banner) banner.style.display = "none";
      // 댓글 그룹 자동 선택
      const sel = document.getElementById("commentGroup");
      if (sel) sel.value = group;
    } catch (e) {
      console.error("무료 투표 저장 실패:", e);
      showToast("⚠️ 투표 저장에 실패했습니다. 다시 시도해주세요.");
    }

    // listenRankings()에서 자동으로 Firebase 데이터 감지 후 renderRankings() 호출
    return;
  }

  // ★ 광고 투표 사용 가능할 때 (무료 투표 사용 후, 대기 중인 광고 투표권이 있을 때)
  if (canUseAdVotes()) {
    // Firebase에 광고 투표 기록
    const today = getTodayKey();
    const newAdVoteCount = cachedTodayAdVotes + 1;

    try {
      // Firebase에 광고 투표 개수 저장
      await db.ref(`users/${currentUser.uid}/ad_votes_used_${today}`).set(newAdVoteCount);

      // 캐시 업데이트
      cachedTodayAdVotes = newAdVoteCount;

      // 광고 투표권 차감
      pendingAdVotes -= 1;
      await savePendingAdVotes();

      recordVote(group); // 로컬 히스토리 기록
      addActivity(group);

      // Firebase에 투표 기록 (비동기)
      db.ref("rankings/" + group).transaction(cur => (cur || 0) + 1);

      const remaining = pendingAdVotes;
      showToast(`${meta.emoji} ${group} 광고 투표 완료! 광고투표 ${newAdVoteCount}/10표 🎉 ${remaining > 0 ? `(남은 투표권: ${remaining}개)` : ""}`);

      renderMyVotingHistory();
      showMyVotedBar(cachedTodayFreeVote);
      updateFavBar(); // 광고 바 상태 업데이트 (남은 투표권 표시)
      updateAuthUI(); // ★ 닉네임 옆 투표권 정보 업데이트
    } catch (e) {
      console.error("광고 투표 저장 실패:", e);
      showToast("⚠️ 투표 저장에 실패했습니다. 다시 시도해주세요.");
    }

    // listenRankings()에서 자동으로 Firebase 데이터 감지 후 renderRankings() 호출
    return;
  }

  // ★ 이미 모든 투표를 사용한 경우
  if (getTodayVoteCount() >= MAX_TOTAL_VOTES_PER_DAY) {
    showToast(`🏆 오늘 최대 투표 11표를 모두 사용했어요! 내일 또 와줘 💜`);
    updateFavBar();
    return;
  }

// ── 투표 후 상단 바 표시 ──
function showMyVotedBar(group) {
  const bar = document.getElementById("myVotedBar");
  const msgEl = document.getElementById("myVotedMsg");
  const subEl = document.getElementById("myVotedSub");
  if (!bar || !msgEl || !subEl || !group) return;
  const meta = GROUP_META[group] || { emoji: "🌟" };
  const rankData = allRankingsData || {};
  const total = Object.values(rankData).reduce((s, v) => s + v, 0);
  const myVotes = rankData[group] || 0;
  const pct = total ? Math.round(myVotes / total * 100) : 0;
  const streak = getVotingStreak();

  // 현재 순위 계산
  const sorted = Object.entries(rankData).sort((a, b) => b[1] - a[1]);
  const myRank = sorted.findIndex(([g]) => g === group) + 1;

  // 순위별 감성 메시지
  let msg, sub;
  const streakDisplay = streak > 1 ? ` 🔥 ${streak}일 연속!` : "";
  if (myRank === 1 && myVotes > 0) {
    msg = `👑 ${meta.emoji} ${group} 현재 1위! 이 기세 유지하자!${streakDisplay}`;
    sub = `현재 ${pct}% (${myVotes.toLocaleString()}표) · 친구 불러서 격차 벌리자! 💪`;
  } else if (myRank === 2 || myRank === 3) {
    const leader = sorted[0];
    const gap = leader ? (leader[1] - myVotes) : 0;
    msg = `🔥 ${meta.emoji} ${group} ${myRank}위! 1위까지 ${gap.toLocaleString()}표 차이!${streakDisplay}`;
    sub = `현재 ${pct}% · 지금 공유해서 역전 노려봐! 📢`;
  } else if (myVotes === 0 || total === 0) {
    msg = `${meta.emoji} ${group} 투표 완료! 첫 표를 던졌어!${streakDisplay}`;
    sub = `친구한테도 알려서 우리 팀 1위 만들자! 💜`;
  } else {
    msg = `${meta.emoji} ${group} 투표 완료! 현재 ${myRank}위 · ${pct}%${streakDisplay}`;
    sub = `${myVotes.toLocaleString()}표 · 친구 불러서 순위 올리자! 🚀`;
  }

  // 내일 투표 가능 시간
  const now = new Date(); const next = new Date(now);
  next.setDate(next.getDate() + 1); next.setHours(0, 0, 0, 0);
  const diff = next - now;
  const h = Math.floor(diff / 3600000); const m = Math.floor((diff % 3600000) / 60000);
  const todayCount = getTodayVoteCount();

  // 모든 투표를 사용한 경우 특별 메시지
  if (todayCount >= MAX_TOTAL_VOTES_PER_DAY) {
    sub = `🏆 오늘 최대 투표 ${MAX_TOTAL_VOTES_PER_DAY}/${MAX_TOTAL_VOTES_PER_DAY}표 모두 사용! 대단해! 💪`;
    sub += `<br style="height:4px"> ⏰ 내일 ${h}시간 ${m}분 후 다시 투표할 수 있어요!`;
  } else {
    sub += `  ⏰ ${h}시간 ${m}분 후 재투표`;
  }

  msgEl.textContent = msg;
  subEl.textContent = sub;

  // 팬덤 선택 바 업데이트 (광고 버튼 상태 포함)
  updateFavBar();

  // 친구 초대 권유 배너
  let shareCtaEl = document.getElementById("shareCtaBar");
  if (!shareCtaEl) {
    shareCtaEl = document.createElement("div");
    shareCtaEl.id = "shareCtaBar";
    shareCtaEl.style.cssText = "margin-top:10px;padding:10px 12px;border-radius:10px;background:linear-gradient(135deg,rgba(255,77,141,0.12),rgba(124,77,255,0.1));border:1px solid rgba(255,77,141,0.3);font-size:.8rem;text-align:center;color:var(--pink);font-weight:700;cursor:pointer;transition:all 0.15s";

// ── 투표 축하 confetti ──
function showConfetti(baseColor) {
  const canvas = document.createElement("canvas");
  canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;";
  document.body.appendChild(canvas);
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext("2d");
  const colors = [baseColor || "#7c4dff", "#ff4d8d", "#ffd700", "#4d9eff", "#00e676", "#ff6b35"];
  const pieces = Array.from({ length: 70 }, () => ({
    x: Math.random() * canvas.width,
    y: -12,
    r: Math.random() * 5 + 3,
    vy: Math.random() * 4 + 3,
    vx: (Math.random() - 0.5) * 3,
    tilt: Math.random() * 10 - 5,
    tiltInc: Math.random() * 0.07 + 0.04,
    tiltAngle: 0,
    color: colors[Math.floor(Math.random() * colors.length)],
    alpha: 1
  }));
  let frame = 0;
  const MAX = 90;
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.tiltAngle += p.tiltInc;
      p.y += p.vy;
      p.x += p.vx;
      p.tilt = Math.sin(p.tiltAngle) * 11;
      if (frame > MAX * 0.6) p.alpha = Math.max(0, p.alpha - 0.04);
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.lineWidth = p.r;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
    frame++;
    if (frame < MAX) requestAnimationFrame(draw);
    else canvas.remove();
  })();
}

// ── 랭킹 실시간 리슨 ──
let lastRankingData = null;
let trendingData = {}; // 최근 투표 속도 추적

function updateTrending() {
  // 매 업데이트마다 trending 점수 감소 (최대 12초)
  Object.keys(trendingData).forEach(group => {
    trendingData[group]--;
    if (trendingData[group] <= 0) delete trendingData[group];
  });
}

function isTrending(group) {
  return trendingData[group] && trendingData[group] > 5;
}

function listenRankings() {
  db.ref("rankings").on("value", snap => {
    allRankingsData = snap.val() || {};

    // 첫 로드 시 스켈레톤 제거
    if (!lastRankingData) {
      const skeletonEl = document.getElementById("skeletonLoader");
      if (skeletonEl) skeletonEl.remove();
    }

    // 매번 투표 상태 확인해서 배너 표시/숨김
    showVoteGuideBanner();

    // 변화가 있는 그룹 감지해서 activity 추가
    if (lastRankingData) {
      Object.entries(allRankingsData).forEach(([group, votes]) => {
        const oldVotes = lastRankingData[group] || 0;
        if (votes > oldVotes) {
          // 새로운 투표 있음
          const diff = votes - oldVotes;
          trendingData[group] = Math.min(10, (trendingData[group] || 0) + diff);
          for (let i = 0; i < diff; i++) {
            setTimeout(() => addActivity(group), i * 200);
          }
        }
      });
    }

    lastRankingData = { ...allRankingsData };
    updateTrending();
    updateTodayVoteDisplay();
    renderRankings(allRankingsData);
    updatePageTitle(allRankingsData);
  });
}

function renderRankings(data) {
  const el = document.getElementById("rankingList");
  const myVotedGroup = cachedTodayFreeVote;       // 오늘 투표한 그룹명 or null
  const alreadyVoted = !!myVotedGroup;
  const myFavGroup = getMyFav();

  // 전체 그룹 정렬 (투표수 내림차순)
  const allEntries = ALL_GROUPS.map(g => [g, data[g] || 0]).sort((a, b) => b[1] - a[1]);
  const totalVotes = allEntries.reduce((s, [, v]) => s + v, 0);

  // 총 참여자 수 업데이트
  const tvEl = document.getElementById("totalVotesEl");
  if (tvEl) tvEl.textContent = totalVotes.toLocaleString();

  // 투표 후 상태바 갱신
  if (alreadyVoted) restoreVotedState();
  const isAdPending = pendingAdVotes > 0; // 광고로부터 얻은 투표권이 있는지 확인

  // 검색 필터 적용
  const filtered = rankingSearchQuery
    ? allEntries.filter(([g]) => g.toLowerCase().includes(rankingSearchQuery) || (GROUP_META[g]?.fandom?.toLowerCase().includes(rankingSearchQuery)))
    : allEntries;

  const withVotes = filtered.filter(([, v]) => v > 0);
  const zeroVotes = filtered.filter(([, v]) => v === 0);

  const rankNums = ["", "👑", "🥈", "🥉"];
  const rankClasses = ["", "gold", "silver", "bronze"];

  // 1위 그룹의 투표수 가져오기
  const firstPlaceVotes = withVotes.length > 0 ? withVotes[0][1] : 0;

  // 상위 3팀의 투표 격차가 작은지 확인 (경쟁이 뜨거운지)
  const isCloseRace = withVotes.length >= 3 &&
    firstPlaceVotes > 0 &&
    (firstPlaceVotes - withVotes[2][1]) < (firstPlaceVotes * 0.15); // 15% 이내

  const renderRow = (group, votes, rank, faded = false) => {
    const meta = GROUP_META[group] || { emoji: "🌟", color: "#7c4dff", fandom: "" };
    const isFav = group === myFavGroup;
    const isVoted = myVotedGroup === group;
    const isFirst = rank === 1 && votes > 0;
    const pct = totalVotes ? Math.round(votes / totalVotes * 100) : 0;

    // ★ 한글 + 영문 이름 표시
    const displayName = meta.kr ? `${meta.kr} (${group})` : group;

    // 1위까지의 거리 계산
    let distanceBar = "";
    if (!isFirst && votes > 0 && firstPlaceVotes > 0) {
      const gap = firstPlaceVotes - votes;
      distanceBar = `<div style="margin-top:6px;font-size:.73rem;color:var(--primary);margin-bottom:4px;font-weight:700">🎯 1위까지 <span style="color:var(--pink);font-size:.8rem">${gap.toLocaleString()}표</span> 남음!</div>`;
    }

    const rec = groupRecords[group];
    const recBadge = rec && rec.wins ? `<span class="record-badge">🏆 ${rec.wins}회</span>` : "";
    const trendingBadge = isTrending(group) ? `<span class="record-badge" style="background:rgba(255,107,53,0.2);color:#ff6b35;animation:pulse 1s infinite">🔥 핫</span>` : "";
    const closeRaceApplies = isCloseRace && rank <= 3;
    const closeRaceBadge = closeRaceApplies ? `<span class="close-race-badge">⚡경쟁 중</span>` : "";
    const votedBadge = isVoted ? `<span class="my-voted-badge">✅ 내 투표</span>` : "";
    const firstCrown = isFirst ? `<span class="rank-first-crown">1위</span>` : "";
    const fadedStyle = faded ? 'style="opacity:0.5"' : "";
    return `
      <div class="rank-item ${isFirst ? "rank-first" : ""} ${closeRaceApplies ? "close-race" : ""} ${isVoted ? "my-voted" : ""} ${isFav ? "my-fav-rank" : ""}" data-group="${escAttr(group)}" ${fadedStyle}>
        <div class="rank-num ${rankClasses[rank] || ""}">${rankNums[rank] || rank}</div>
        <div class="rank-emoji">${meta.emoji}</div>
        <div class="rank-info">
          <div class="rank-name">${isFav ? '<span class="my-fav-star">⭐</span>' : ""}${escHtml(displayName)}${firstCrown}${votedBadge}${closeRaceBadge}${trendingBadge}${recBadge}</div>
          ${meta.fandom ? `<div class="rank-fandom">${escHtml(meta.fandom)}</div>` : ""}
          <div class="rank-vote-meta">
            <div class="rank-pct-bar-wrap">
              <div class="rank-pct-bar" style="width:${pct}%;background:${meta.color}"></div>
            </div>
            <span class="rank-pct-label">${pct}%</span>
          </div>
          ${distanceBar}
        </div>
        <div class="rank-right">
          <div class="rank-votes">${fmtVotes(votes)}</div>
          <button class="vote-rank-btn ${isVoted ? "voted" : ""} ${isAdPending ? "ad-active" : ""}"
            onclick="voteForGroup('${escAttr(group)}')"
            ${(pendingAdVotes === 0 && !canUseFreeVote()) ? "disabled" : ""}>
            ${isAdPending ? "⚡ 추가 투표!" : isVoted ? "✅ 투표함" : meta.emoji + " 투표"}
          </button>
        </div>
      </div>`;
  };

  // 댓글 필터 탭에 상위 그룹 반영 (상위 5팀까지)
  updateCommentFilterTabs(withVotes.slice(0, 5).map(([g]) => g));

  let html = "";

  if (withVotes.length === 0) {
    // 첫 달 / 초기화 직후 — 안내 + 상위 10개만 노출
    const INITIAL_SHOW = 10;
    html = `<div class="ranking-empty-hint">
      <div style="font-size:1.6rem;margin-bottom:8px">🎯</div>
      <p style="margin-bottom:8px;font-weight:700">아직 이번 달 투표가 없어요!</p>
      <p style="font-size:.77rem;line-height:1.5">
        누구나 참여 가능! 😍<br>
        하루 1표 무료 · 광고시청 시 최대 10표<br>
        <strong>첫 번째 투표의 주인공이 되어봐! 💜</strong>
      </p>
    </div>`;
    const initial = allEntries.slice(0, showAllRankings ? allEntries.length : INITIAL_SHOW);
    html += initial.map(([g, v], i) => renderRow(g, v, i + 1)).join("");
    if (!showAllRankings && allEntries.length > INITIAL_SHOW) {
      html += `<div class="rank-show-more">
        <button class="show-all-btn" onclick="toggleAllRankings()">▼ 전체 ${allEntries.length - INITIAL_SHOW}개 그룹 더보기</button>
      </div>`;
    } else if (showAllRankings) {
      html += `<div class="rank-show-more"><button class="show-all-btn" onclick="toggleAllRankings()">▲ 접기</button></div>`;
    }
  } else {
    html = withVotes.map(([g, v], i) => renderRow(g, v, i + 1)).join("");

    if (showAllRankings) {
      html += zeroVotes.map(([g, v], i) => renderRow(g, v, withVotes.length + i + 1, true)).join("");
      if (zeroVotes.length) html += `<div class="rank-show-more"><button class="show-all-btn" onclick="toggleAllRankings()">▲ 접기</button></div>`;
    } else if (zeroVotes.length) {
      html += `<div class="rank-show-more">
        <button class="show-all-btn" onclick="toggleAllRankings()">▼ 아직 투표 없는 그룹 ${zeroVotes.length}개 보기</button>
      </div>`;
    }
  }

  // ★ 그룹 추천 메시지 추가
  html += `<div style="margin-top:28px;padding:20px;border-top:1px solid var(--border);text-align:center;color:var(--muted)">
    <div style="font-size:1.2rem;margin-bottom:8px">💜</div>
    <div style="font-weight:700;margin-bottom:6px">찾는 팬덤이 없다면?</div>
    <div style="font-size:.85rem;line-height:1.5;margin-bottom:12px">
      좋아하는 그룹을 추천해주세요!<br>
      더 많은 팬들과 응원할 수 있어요 ✨
    </div>
  </div>`;

  el.innerHTML = html;
}

function getShareText() {
  const myGroup = cachedTodayFreeVote;

  return { title, text, url: shareUrl };
}

function handleShareRef() {
  const params = new URLSearchParams(location.search);
  const ref = params.get("ref");
  if (ref) {
    setTimeout(() => scrollToMyGroup(ref), 1200);
    showToast(`친구 초대감사! ${escHtml(ref)} 팬덤을 보고 있어요 💜`);

async function shareNative() {
  const { title, text, url } = getShareText();
  if (navigator.share) {
    try {
      await navigator.share({ title, text: text + "\n" + url });
      return;
    } catch (e) { /* 취소 시 무시 */ }
  }
  // fallback: 클립보드 복사
  try {
    await navigator.clipboard.writeText(url);
    showToast("링크 복사됨! 친구한테 공유해줘 💜");
  } catch {
    // 구형 브라우저 fallback
    const ta = document.createElement("textarea");
    ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("링크 복사됨! 💜");
  }
}

function shareKakao() {
  const { text, url } = getShareText();
  // Kakao SDK 없이 카카오톡 URL 스킴 + 웹 fallback
  const kakaoShareUrl = "https://sharer.kakao.com/talk/friends/picker/link?app_key=undefined&validation_action=default&validation_params={}";
  // 실용적 방법: 카카오 오픈채팅 or 링크 공유
  // navigator.share가 있으면 카카오도 목록에 뜸
  if (navigator.share) {
    navigator.share({ title: "팬덤배틀", text: text.replace(/#\S+/g, "").trim(), url });
    return;
  }
  // 없으면 링크 복사
  shareNative();
}

function shareToX() {
  const { text, url } = getShareText();
  const tweetText = text + " 👉 " + url;
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(tweetText), "_blank", "width=600,height=400");
}

    const canVote = canUseFreeVote() || (pendingAdVotes > 0 && adVoteCount < MAX_AD_VOTES_PER_DAY);

    // ★ 모든 투표를 사용한 경우 축하 메시지
    if (totalVoteCount >= MAX_TOTAL_VOTES_PER_DAY) {
      rightButton = `<span style="font-size:0.85rem;color:var(--gold);font-weight:700">🏆 11표 완투! 내일 또 와줘!</span>`;
    }
    // ★ 투표권이 있으면 활성화 버튼 (무료 또는 광고)
    else if (canVote) {
      rightButton = `<button class="fav-bar-ad-btn show ready" onclick="voteForGroup('${escAttr(fav)}')">🎁 ${escHtml(shortName)}에 빠른 투표하기</button>`;
    }
    // ★ 투표권이 없으면 비활성화 버튼
    else if (adWatchCount < MAX_AD_VOTES_PER_DAY) {
      rightButton = `<button class="fav-bar-ad-btn" onclick="showToast('투표권을 먼저 획득해주세요! 광고를 시청하면 투표권이 생겨요 🎁')" disabled style="opacity:0.5;cursor:not-allowed">🎁 ${escHtml(shortName)}에 빠른 투표하기</button>`;
    }
    // ★ 광고 10회 완료
    else {
      rightButton = `<span style="font-size:0.85rem;color:var(--gold)">✨ 내일 투표권이 생겨요!</span>`;
    }
  }

  // 레이아웃: [팀 변경] | [버튼]
  rightContent = rightButton ? rightButton : '';

  bar.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;flex:1">
      ${leftContent}
      ${centerContent}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      ${rightContent}
    </div>
  `;
}

function showFavBar() {
  updateFavBar();
}

function openFavPicker() {
  // 로그인 필수 확인
  if (!isLoggedIn) {
    showToast("💜 팬덤을 선택하려면 먼저 로그인하세요!");
    showVoteLoginModal(null); // 로그인 모달 표시 (팬덤 선택용)
    return;
  }

  if (document.getElementById("favPicker")) return;
  const myFav = getMyFav();
  const overlay = document.createElement("div");
  overlay.id = "favPicker";
  overlay.className = "fav-picker";
  overlay.onclick = e => { if (e.target === overlay) closeFavPicker(); };

  // ESC 키로도 닫기
  const handleEsc = (e) => {
    if (e.key === "Escape") {
      closeFavPicker();
      document.removeEventListener("keydown", handleEsc);
    }
  };
  document.addEventListener("keydown", handleEsc);

  const grid = ALL_GROUPS.map(g => {
    const meta = GROUP_META[g] || { emoji:"🌟" };
    // ★ 한글 + 영문 이름 표시
    const displayName = meta.kr ? `${meta.kr} (${g})` : g;
    return `<button class="fav-picker-btn ${myFav===g?"selected":""}" onclick="pickFav('${escAttr(g)}')">
      <span class="fp-emoji">${meta.emoji}</span>
      <span class="fp-name">${escHtml(displayName)}</span>
    </button>`;
  }).join("");
  overlay.innerHTML = `<div class="fav-picker-sheet">
    <div class="fav-picker-title">💜 내 최애 그룹은?<button class="fav-picker-close" onclick="closeFavPicker()">✕</button></div>
    <div class="fav-picker-grid">${grid}</div>
  </div>`;
  document.body.appendChild(overlay);

  // 모바일 뒤로가기 처리: 모달 열릴 때 history에 entry 추가
  window.history.pushState({ modal: "favPicker" }, null, null);

  // 모달이 닫힐 때 popstate 이벤트 제거를 위한 준비
  const handleFavPopstate = () => {
    closeFavPicker();
    window.removeEventListener("popstate", handleFavPopstate);
  };
  window.addEventListener("popstate", handleFavPopstate);
}

function closeFavPicker() { document.getElementById("favPicker")?.remove(); }

function pickFav(group) {
  setMyFav(group);
  closeFavPicker();
  showToast(`💜 ${group} 팬으로 설정됐어!`);
}


// ── 유틸 ──
function fmtVotes(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, "") + "만";
  return n.toLocaleString();
}
function escHtml(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg;
  t.classList.add("show"); clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove("show"), 2500);
}

init();
</script>
</body>
</html>
