<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팬덤배틀 - 아이돌 팬덤 파워 대결</title>
  <meta name="description" content="BTS, 블랙핑크, 에스파, 뉴진스! 매주 새로운 빅매치 투표와 실시간 팬덤 파워 랭킹. 내 최애 그룹을 1등으로!" />
  <meta property="og:title" content="팬덤배틀 - 아이돌 팬덤 파워 대결" />
  <meta property="og:description" content="매주 빅매치 투표! 내 최애 그룹 팬덤 파워를 증명해봐 💪" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #0d0d1a;
      --card: #16162a;
      --border: #2a2a4a;
      --primary: #7c4dff;
      --pink: #ff4d8d;
      --blue: #4d9eff;
      --gold: #ffd700;
      --text: #f0f0ff;
      --muted: #8888aa;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 헤더 ── */
    header { text-align: center; padding: 32px 16px 24px; background: linear-gradient(180deg, #1a0a2e 0%, var(--bg) 100%); }
    header h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(135deg, var(--pink), var(--primary), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    header p { margin-top: 6px; font-size: 0.9rem; color: var(--muted); }
    .live-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(255,77,141,0.15); border: 1px solid rgba(255,77,141,0.3); font-size: 0.75rem; color: var(--pink); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── 메인 ── */
    main { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── 섹션 제목 ── */
    .section-title { font-size: 1rem; font-weight: 700; color: var(--muted); margin: 28px 0 14px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.82rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── 빅매치 카드 ── */
    .battle-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .battle-header { text-align: center; padding: 14px 16px 12px; background: linear-gradient(135deg, rgba(255,77,141,0.1), rgba(124,77,255,0.1), rgba(77,158,255,0.1)); border-bottom: 1px solid var(--border); }
    .battle-label { font-size: 0.72rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }
    .countdown { font-size: 1.05rem; font-weight: 700; margin-top: 4px; color: var(--text); }
    .countdown span { color: var(--pink); }
    .total-votes-label { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

    .battle-arena { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; align-items: stretch; }
    .fighter { padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: background 0.2s; }
    .fighter.side-a { background: linear-gradient(135deg, rgba(255,77,141,0.08) 0%, transparent 60%); border-right: 1px solid var(--border); }
    .fighter.side-b { background: linear-gradient(225deg, rgba(77,158,255,0.08) 0%, transparent 60%); }
    .fighter-emoji { font-size: 2.8rem; line-height: 1; }
    .fighter-name { font-size: 1.15rem; font-weight: 900; text-align: center; line-height: 1.2; }
    .fighter-votes { font-size: 0.8rem; color: var(--muted); }
    .vote-btn { padding: 10px 22px; border-radius: 24px; border: none; font-size: 0.92rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .vote-btn-a { background: linear-gradient(135deg, var(--pink), #c0004d); color: #fff; box-shadow: 0 4px 14px rgba(255,77,141,0.35); }
    .vote-btn-b { background: linear-gradient(135deg, var(--blue), #0055cc); color: #fff; box-shadow: 0 4px 14px rgba(77,158,255,0.35); }
    .vote-btn:hover { transform: translateY(-2px) scale(1.04); }
    .vote-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .voted-badge { font-size: 0.72rem; color: var(--muted); text-align: center; }

    .vs-center { display: flex; align-items: center; justify-content: center; padding: 0 6px; }
    .vs-text { font-size: 1.3rem; font-weight: 900; color: var(--border); letter-spacing: -1px; }

    /* ── 투표 바 ── */
    .battle-bar-wrap { padding: 14px 16px 16px; border-top: 1px solid var(--border); }
    .battle-bar { height: 10px; border-radius: 6px; background: var(--border); overflow: hidden; display: flex; }
    .bar-a { background: linear-gradient(90deg, var(--pink), #ff80b0); transition: width 0.6s cubic-bezier(.4,0,.2,1); border-radius: 6px 0 0 6px; }
    .bar-b { background: linear-gradient(90deg, #80bfff, var(--blue)); transition: width 0.6s cubic-bezier(.4,0,.2,1); border-radius: 0 6px 6px 0; flex: 1; }
    .bar-labels { display: flex; justify-content: space-between; margin-top: 7px; font-size: 0.78rem; font-weight: 700; }
    .bar-labels .pct-a { color: var(--pink); }
    .bar-labels .pct-b { color: var(--blue); }

    /* ── 투표 완료 오버레이 ── */
    .voted-overlay { padding: 18px 16px; text-align: center; background: rgba(124,77,255,0.08); border-top: 1px solid var(--border); display: none; }
    .voted-overlay.show { display: block; }
    .voted-msg { font-size: 0.88rem; color: var(--primary); font-weight: 700; }
    .voted-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* ── 광고 자리 ── */
    .ad-slot { background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--muted); font-size: 0.78rem; min-height: 80px; display: flex; align-items: center; justify-content: center; }

    /* ── 랭킹 ── */
    .ranking-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; display: flex; align-items: center; gap: 14px; transition: border-color 0.15s; }
    .rank-item:hover { border-color: var(--primary); }
    .rank-item.battle-now { border-color: rgba(255,77,141,0.5); background: rgba(255,77,141,0.05); }
    .rank-num { font-size: 1rem; font-weight: 900; min-width: 28px; text-align: center; }
    .rank-num.gold { color: var(--gold); }
    .rank-num.silver { color: #c0c0c0; }
    .rank-num.bronze { color: #cd7f32; }
    .rank-emoji { font-size: 1.5rem; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-weight: 700; font-size: 0.95rem; }
    .rank-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .rank-votes { font-weight: 700; font-size: 0.92rem; color: var(--primary); white-space: nowrap; }
    .battle-now-tag { font-size: 0.65rem; background: rgba(255,77,141,0.2); color: var(--pink); border-radius: 6px; padding: 2px 6px; font-weight: 700; }

    /* ── 역대 기록 ── */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; font-size: 0.84rem; }
    .history-week { font-size: 0.7rem; color: var(--muted); min-width: 60px; }
    .history-match { flex: 1; display: flex; align-items: center; gap: 8px; }
    .history-winner { font-weight: 700; color: var(--gold); }
    .history-loser { color: var(--muted); }
    .history-score { font-size: 0.72rem; color: var(--muted); }

    /* ── 공유 버튼 ── */
    .share-row { display: flex; gap: 8px; justify-content: center; margin-top: 6px; }
    .share-btn { padding: 9px 20px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.82rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .share-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a3e; color: var(--text); padding: 12px 24px; border-radius: 12px; font-size: 0.88rem; font-weight: 600; z-index: 9999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; border: 1px solid var(--border); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 0.9rem; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 관리자 패널 ── */
    .admin-panel { background: var(--card); border: 1px solid #ff4d4d55; border-radius: var(--radius); padding: 20px; margin-top: 28px; }
    .admin-panel h3 { color: #ff4d4d; font-size: 0.85rem; margin-bottom: 14px; letter-spacing: 1px; }
    .admin-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .admin-row label { font-size: 0.78rem; color: var(--muted); min-width: 80px; }
    .admin-row select, .admin-row input { padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.82rem; flex: 1; min-width: 120px; }
    .admin-btn { padding: 9px 18px; border-radius: 10px; border: none; background: var(--primary); color: #fff; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; transition: opacity 0.15s; }
    .admin-btn:hover { opacity: 0.85; }
    .admin-btn.danger { background: #cc2222; }

    /* ── 다음 배틀 상대 투표 ── */
    .next-vote-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .nv-desc { padding: 11px 16px; font-size: 0.8rem; color: var(--muted); border-bottom: 1px solid var(--border); text-align: center; }
    .nv-desc strong { color: var(--text); }
    .nv-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .nv-item:last-child { border-bottom: none; }
    .nv-item:hover { background: rgba(255,255,255,0.04); }
    .nv-item.my-pick { background: rgba(124,77,255,0.1); }
    .nv-item.nv-top { background: rgba(255,215,0,0.06); }
    .nv-emoji { font-size: 1.2rem; flex-shrink: 0; }
    .nv-name { font-size: 0.88rem; font-weight: 700; min-width: 110px; }
    .nv-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .nv-bar { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .nv-pct { font-size: 0.75rem; font-weight: 700; color: var(--muted); min-width: 34px; text-align: right; }
    .nv-check { font-size: 0.8rem; margin-left: 2px; }

    /* ── 챔피언 카드 ── */
    .champ-card-wrap { text-align: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }

    /* ── 공유 힌트 (투표 전) ── */
    .share-hint { padding: 11px 16px; text-align: center; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .share-btn-inline { padding: 5px 13px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .share-btn-inline:hover { border-color: var(--primary); color: var(--primary); }

    /* ── 랭킹 더보기 ── */
    .rank-show-more { margin-top: 4px; }
    .show-all-btn { width: 100%; padding: 10px; background: none; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); font-size: 0.8rem; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .show-all-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── 일일 응원 스탬프 ── */
    .cheer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 8px; }
    .cheer-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.15s; }
    .cheer-item.cheered-today { border-color: var(--primary); background: rgba(124,77,255,0.1); }
    .cheer-emoji { font-size: 1.5rem; }
    .cheer-name { font-size: 0.76rem; font-weight: 700; text-align: center; }
    .cheer-count { font-size: 0.68rem; color: var(--muted); }
    .cheer-btn { padding: 4px 12px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.7rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; margin-top: 2px; }
    .cheer-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .cheer-btn.done { background: var(--primary); color: #fff; border-color: var(--primary); cursor: default; }

    /* ── 응원 댓글 ── */
    .comment-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .comment-group-sel { padding: 8px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.8rem; outline: none; cursor: pointer; }
    .comment-group-sel:focus { border-color: var(--primary); }
    .comment-input { flex: 1; padding: 8px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.84rem; outline: none; }
    .comment-input:focus { border-color: var(--primary); }
    .comment-submit { padding: 8px 16px; border-radius: 10px; background: var(--primary); color: #fff; border: none; font-weight: 700; font-family: inherit; font-size: 0.82rem; cursor: pointer; flex-shrink: 0; }
    .comment-list { display: flex; flex-direction: column; gap: 6px; }
    .comment-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; gap: 8px; align-items: flex-start; }
    .comment-badge { font-size: 0.63rem; padding: 2px 7px; border-radius: 7px; font-weight: 700; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-text { font-size: 0.84rem; line-height: 1.4; word-break: break-all; }
    .comment-meta { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }

    /* ── 다음 배틀 예고 ── */
    .next-preview { background: linear-gradient(135deg,rgba(124,77,255,0.1),rgba(255,77,141,0.1)); border: 1px solid rgba(124,77,255,0.25); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 14px; }
    .next-preview-label { font-size: 0.68rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
    .next-preview-match { font-size: 0.95rem; font-weight: 700; }
    .next-preview-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    /* ── 그룹 전적 뱃지 ── */
    .record-badge { font-size: 0.65rem; background: rgba(255,215,0,0.12); color: var(--gold); border-radius: 6px; padding: 1px 6px; font-weight: 700; margin-left: 4px; }

    /* ── 투표 인증 이미지 ── */
    .proof-canvas { width: 100%; border-radius: 10px; display: block; margin-top: 10px; cursor: pointer; }
    .proof-hint { font-size: 0.68rem; color: var(--muted); text-align: center; margin-top: 4px; }

    /* ── 모바일 ── */
    @media (max-width: 480px) {
      header h1 { font-size: 1.7rem; }
      .fighter-name { font-size: 0.98rem; }
      .vote-btn { padding: 9px 16px; font-size: 0.84rem; }
      .fighter-emoji { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚔️ 팬덤배틀</h1>
  <p>내 최애 그룹의 팬덤 파워를 증명해봐!</p>
  <div class="live-badge"><span class="live-dot"></span> LIVE 투표 중</div>
</header>

<main>
  <!-- 이번 주 빅매치 -->
  <div id="battleArea">
    <div class="loading"><div class="spinner"></div><div>배틀 불러오는 중...</div></div>
  </div>

  <!-- 다음 배틀 상대 결정 -->
  <div id="nextVoteSection" style="display:none">
    <div class="section-title" style="margin-top:24px">🎯 다음 배틀 상대 결정 <span style="font-size:.72rem;font-weight:400;color:var(--muted)">이긴 팀이 결정해요!</span></div>
    <div id="nextPreviewBanner"></div>
    <div class="next-vote-card" id="nextVoteGrid"></div>
  </div>

  <!-- 광고 -->
  <div class="section-title" style="margin-top:24px">AD</div>
  <div class="ad-slot"><!-- Google AdSense 광고 영역 --><span>광고 영역</span></div>

  <!-- 일일 응원 스탬프 -->
  <div class="section-title">💪 오늘의 응원 스탬프 <span style="font-size:.72rem;font-weight:400;color:var(--muted)">매일 내 그룹 응원해줘!</span></div>
  <div class="cheer-grid" id="cheerGrid"><div class="loading"><div class="spinner"></div></div></div>

  <!-- 응원 한 마디 -->
  <div class="section-title" style="margin-top:24px">💬 응원 한 마디</div>
  <div class="comment-input-row">
    <select class="comment-group-sel" id="commentGroup"></select>
    <input class="comment-input" id="commentInput" placeholder="우리 팀 응원 한 마디!" maxlength="60" />
    <button class="comment-submit" onclick="postComment()">등록</button>
  </div>
  <div class="comment-list" id="commentList"></div>

  <!-- 전체 랭킹 -->
  <div class="section-title" style="margin-top:24px">🏆 팬덤 파워 랭킹</div>
  <div class="ranking-list" id="rankingList">
    <div class="loading"><div class="spinner"></div><div>랭킹 불러오는 중...</div></div>
  </div>

  <!-- 역대 배틀 기록 -->
  <div id="historySection" style="display:none">
    <div class="section-title">📜 역대 배틀 기록</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- 챔피언 카드 -->
  <div id="champCardSection" style="display:none">
    <div class="section-title">🏆 현재 배틀 챔피언 카드</div>
    <div class="champ-card-wrap">
      <canvas id="champCanvas" width="600" height="320" style="width:100%;border-radius:12px;display:block"></canvas>
      <div class="share-row" style="margin-top:10px">
        <button class="share-btn" onclick="downloadChampCard()">⬇ 카드 저장</button>
        <button class="share-btn" onclick="shareToX()">𝕏 트위터 공유</button>
      </div>
    </div>
  </div>

  <!-- 관리자 패널 (URL에 ?admin=1 추가 시 표시) -->
  <div class="admin-panel" id="adminPanel" style="display:none">
    <h3>🔧 관리자 — 배틀 설정</h3>
    <div class="admin-row">
      <label>그룹 A</label>
      <select id="adminGroupA"></select>
    </div>
    <div class="admin-row">
      <label>그룹 B</label>
      <select id="adminGroupB"></select>
    </div>
    <div class="admin-row">
      <label>종료 일시</label>
      <input type="datetime-local" id="adminEndDate" />
    </div>
    <div class="admin-row">

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function darken(hex) {
  const r = Math.max(0,parseInt(hex.slice(1,3),16)-50), g = Math.max(0,parseInt(hex.slice(3,5),16)-50), b = Math.max(0,parseInt(hex.slice(5,7),16)-50);
  return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
}

// ── 투표 실행 ──
function vote(side) {
  if (!db || !battleData) return;
  if (getMyVote()) { showToast("오늘은 이미 투표했어요!"); return; }

  const key = side === "A" ? "votesA" : "votesB";
  const group = side === "A" ? battleData.groupA : battleData.groupB;

  // 배틀 투표 증가 (transaction으로 안전하게)
  db.ref("current_battle/" + key).transaction(cur => (cur || 0) + 1);

  // 랭킹 누적 증가
  db.ref("rankings/" + group).transaction(cur => (cur || 0) + 1);

  setMyVote(side);
  showToast("💜 " + group + " 투표 완료!");
  // 버튼만 즉시 비활성화, 숫자는 Firebase 리스너가 자동 업데이트
  document.querySelectorAll(".vote-btn").forEach(b => b.disabled = true);
  const votedBtn = document.getElementById(side === "A" ? "btnA" : "btnB");
  if (votedBtn) votedBtn.textContent = "✅ 투표함";
}

// ── 카운트다운 ──
let _cdTimer = null;
function startCountdown(endDateStr) {
  if (_cdTimer) clearInterval(_cdTimer);
  function update() {
    const el = document.getElementById("countdownEl");
    if (!el || !endDateStr) return;
    const diff = new Date(endDateStr) - Date.now();
    if (diff <= 0) { el.innerHTML = "배틀 종료!"; clearInterval(_cdTimer); return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    el.innerHTML = (d > 0 ? `<span>${d}일</span> ` : "") + `<span>${h}시간</span> <span>${m}분</span> 남음`;
  }
  update();
  _cdTimer = setInterval(update, 30000);
}

// ── 랭킹 실시간 리슨 ──
function listenRankings() {
  db.ref("rankings").on("value", snap => {

    renderRankings(allRankingsData);
  });
}

function renderRankings(data) {
  const el = document.getElementById("rankingList");
  const battleGroups = battleData ? [battleData.groupA, battleData.groupB] : [];
  const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]);
  const withVotes = sorted.filter(([, v]) => v > 0);
  const zeroGroups = sorted.filter(([g, v]) => v === 0 && !battleGroups.includes(g));

  // 배틀 중인 그룹은 투표 0이어도 항상 포함
  const toShow = [...withVotes];
  battleGroups.forEach(g => {
    if (!toShow.find(([k]) => k === g)) toShow.unshift([g, data[g] || 0]);
  });
  toShow.sort((a, b) => b[1] - a[1]);

  if (!toShow.length) {
    el.innerHTML = '<div class="loading" style="padding:20px">배틀에 투표하면 랭킹이 집계돼요!</div>';
    return;
  }

  const rankNums = ["","👑","🥈","🥉"];
  const rankClasses = ["","gold","silver","bronze"];

  let html = toShow.map(([group, votes], i) => {
    const rank = i + 1;
    const meta = GROUP_META[group] || { emoji: "🌟" };
    const isBattle = battleGroups.includes(group);
    const rec = groupRecords[group];
    const recBadge = rec && rec.wins ? `<span class="record-badge">👑 ${rec.wins}승${rec.losses ? ` ${rec.losses}패` : ""}</span>` : "";
    return `
      <div class="rank-item ${isBattle?"battle-now":""}">
        <div class="rank-num ${rankClasses[rank]||""}">${rankNums[rank]||rank}</div>
        <div class="rank-emoji">${meta.emoji}</div>
        <div class="rank-info">
          <div class="rank-name">${escHtml(group)}${recBadge} ${isBattle?'<span class="battle-now-tag">배틀 중</span>':""}</div>
          <div class="rank-sub">누적 ${votes.toLocaleString()}표</div>
        </div>
        <div class="rank-votes">${fmtVotes(votes)}</div>
      </div>`;
  }).join("");

  if (showAllRankings) {
    html += zeroGroups.map(([group], i) => {
      const rank = toShow.length + i + 1;
      const meta = GROUP_META[group] || { emoji: "🌟" };
      return `
        <div class="rank-item" style="opacity:0.45">
          <div class="rank-num">${rank}</div>
          <div class="rank-emoji">${meta.emoji}</div>
          <div class="rank-info">
            <div class="rank-name">${escHtml(group)}</div>
            <div class="rank-sub">아직 배틀 참전 전</div>
          </div>
          <div class="rank-votes" style="color:var(--muted)">—</div>
        </div>`;
    }).join("");
  }

  if (zeroGroups.length) {
    html += `<div class="rank-show-more">
      <button class="show-all-btn" onclick="toggleAllRankings()">
        ${showAllRankings ? "▲ 접기" : `▼ 아직 참전 안 한 그룹 ${zeroGroups.length}개 보기`}
      </button>
    </div>`;
  }

  el.innerHTML = html;
}

function toggleAllRankings() {
  showAllRankings = !showAllRankings;
  if (allRankingsData) renderRankings(allRankingsData);
}

// ── 다음 배틀 상대 투표 ──
function listenNextVote() {
  db.ref("next_vote").on("value", snap => renderNextVote(snap.val() || {}));
}

function renderNextVote(data) {
  const sec = document.getElementById("nextVoteSection");
  const grid = document.getElementById("nextVoteGrid");
  const battleGroups = battleData ? [battleData.groupA, battleData.groupB] : [];
  const eligible = ALL_GROUPS.filter(g => !battleGroups.includes(g));
  const sorted = eligible.map(g => [g, data[g] || 0]).sort((a, b) => b[1] - a[1]);
  const totalVotes = sorted.reduce((s, [, v]) => s + v, 0);
  const myPick = localStorage.getItem("next_voted_" + getWeekLabel());
  const topGroup = sorted[0]?.[0];

  renderNextPrediction(data);
  grid.innerHTML = `<div class="nv-desc">⚔️ 다음 배틀 상대는? <strong>지금 가장 많이 뽑힌 그룹이 다음 주 등장해요!</strong></div>` +
    sorted.slice(0, 8).map(([group, votes]) => {
      const pct = totalVotes ? Math.round(votes / totalVotes * 100) : 0;
      const meta = GROUP_META[group] || { emoji: "🌟", color: "#7c4dff" };
      const isMyPick = myPick === group;
      const isTop = group === topGroup && votes > 0;
      return `<div class="nv-item ${isMyPick ? "my-pick" : ""} ${isTop ? "nv-top" : ""}" onclick="voteNext('${escAttr(group)}')">
        <span class="nv-emoji">${meta.emoji}</span>
        <span class="nv-name">${escHtml(group)}${isTop ? " 🔥" : ""}</span>
        <div class="nv-bar-wrap"><div class="nv-bar" style="width:${pct}%;background:${meta.color}"></div></div>
        <span class="nv-pct">${pct > 0 ? pct + "%" : "—"}</span>
        ${isMyPick ? '<span class="nv-check">✅</span>' : ""}
      </div>`;
    }).join("");

  sec.style.display = "block";
}

function voteNext(group) {
  const key = "next_voted_" + getWeekLabel();
  if (localStorage.getItem(key)) { showToast("다음 배틀 상대 투표는 1번만 가능해요!"); return; }
  if (!db) return;
  db.ref("next_vote/" + group).transaction(cur => (cur || 0) + 1);
  localStorage.setItem(key, group);
  showToast("✅ " + group + " 투표! 결과를 기다려봐 🔥");
}

// ── 챔피언 카드 ──
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawChampCard() {
  const canvas = document.getElementById("champCanvas");
  if (!canvas || !battleData) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const vA = battleData.votesA || 0, vB = battleData.votesB || 0;
  const total = vA + vB;
  const pctA = total ? Math.round(vA / total * 100) : 50;
  const pctB = 100 - pctA;
  const mA = GROUP_META[battleData.groupA] || { color: "#7c4dff", emoji: "🌟" };
  const mB = GROUP_META[battleData.groupB] || { color: "#4d9eff", emoji: "🌟" };

  // 배경
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0d0d1a"); bg.addColorStop(0.5,"#16162a"); bg.addColorStop(1,"#0d0d1a");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // 양쪽 글로우
  [[W*0.22,mA.color],[W*0.78,mB.color]].forEach(([cx,col]) => {
    const g = ctx.createRadialGradient(cx,H*0.5,0,cx,H*0.5,W*0.38);
    g.addColorStop(0,col+"55"); g.addColorStop(1,"transparent");
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  });

  ctx.textAlign = "center";

  // 상단 타이틀
  ctx.fillStyle = "#ffffff88"; ctx.font = "bold 15px sans-serif";
  ctx.fillText("⚔️  팬덤배틀 이번 주 빅매치  ⚔️", W/2, 38);

  // 그룹 A
  ctx.font = "40px sans-serif"; ctx.fillStyle = mA.color;
  ctx.fillText(mA.emoji, W*0.22, 120);
  ctx.font = "bold 22px sans-serif"; ctx.fillStyle = "#fff";
  ctx.fillText(battleData.groupA, W*0.22, 158);
  ctx.font = "bold 36px sans-serif"; ctx.fillStyle = mA.color;
  ctx.fillText(pctA + "%", W*0.22, 204);
  ctx.font = "13px sans-serif"; ctx.fillStyle = "#ffffff66";
  ctx.fillText(vA.toLocaleString() + "표", W*0.22, 224);

  // VS
  ctx.font = "bold 22px sans-serif"; ctx.fillStyle = "#ffffff33";
  ctx.fillText("VS", W/2, 178);

  // 그룹 B
  ctx.font = "40px sans-serif"; ctx.fillStyle = mB.color;
  ctx.fillText(mB.emoji, W*0.78, 120);
  ctx.font = "bold 22px sans-serif"; ctx.fillStyle = "#fff";
  ctx.fillText(battleData.groupB, W*0.78, 158);
  ctx.font = "bold 36px sans-serif"; ctx.fillStyle = mB.color;
  ctx.fillText(pctB + "%", W*0.78, 204);
  ctx.font = "13px sans-serif"; ctx.fillStyle = "#ffffff66";
  ctx.fillText(vB.toLocaleString() + "표", W*0.78, 224);

  // 투표 바
  const bx=50, by=250, bw=W-100, bh=14;
  rrect(ctx,bx,by,bw,bh,7); ctx.fillStyle="#ffffff18"; ctx.fill();
  const bwA = Math.max(0, Math.round(bw*pctA/100));
  if (bwA>0) { rrect(ctx,bx,by,bwA,bh,7); ctx.fillStyle=mA.color; ctx.fill(); }
  if (bw-bwA>0) { rrect(ctx,bx+bwA,by,bw-bwA,bh,7); ctx.fillStyle=mB.color; ctx.fill(); }

  // 총 참여
  ctx.fillStyle="#ffffff55"; ctx.font="13px sans-serif";
  ctx.fillText("총 "+total.toLocaleString()+"명 참여", W/2, 290);
  ctx.fillStyle="#ffffff33"; ctx.font="12px sans-serif";
  ctx.fillText("fandomkorea.github.io/fandom-battle", W/2, 312);
}

function showChampCard() {
  const sec = document.getElementById("champCardSection");
  const total = (battleData?.votesA||0)+(battleData?.votesB||0);
  if (!battleData || total < 2) { sec.style.display="none"; return; }
  sec.style.display = "block";
  setTimeout(drawChampCard, 50);
}

function downloadChampCard() {
  drawChampCard();
  const a = document.createElement("a");
  a.download = "팬덤배틀_챔피언카드.png";
  a.href = document.getElementById("champCanvas").toDataURL("image/png");
  a.click();
  showToast("카드 저장됨! SNS에 공유해봐 💜");

// ── 역대 기록 ──
function loadHistory() {
  db.ref("battle_history").limitToLast(5).once("value", snap => {
    const data = snap.val();
    if (!data) return;
    const sec = document.getElementById("historySection");
    const list = document.getElementById("historyList");
    const items = Object.values(data).reverse();
    list.innerHTML = items.map(h => {
      const winner = (h.votesA || 0) >= (h.votesB || 0) ? h.groupA : h.groupB;
      const loser  = winner === h.groupA ? h.groupB : h.groupA;
      const wVotes = winner === h.groupA ? (h.votesA||0) : (h.votesB||0);
      const lVotes = winner === h.groupA ? (h.votesB||0) : (h.votesA||0);
      return `<div class="history-item">
        <div class="history-week">${h.week || ""}</div>
        <div class="history-match">
          <span class="history-winner">🏆 ${escHtml(winner)}</span>
          <span style="color:var(--muted)">vs</span>
          <span class="history-loser">${escHtml(loser)}</span>
        </div>
        <div class="history-score">${wVotes.toLocaleString()} : ${lVotes.toLocaleString()}</div>
      </div>`;
    }).join("");
    sec.style.display = "block";
  });
}

// ── 공유 ──
function shareResult() {
  if (!battleData) return;
  const url = location.href.split("?")[0];
  navigator.clipboard.writeText(url).then(() => showToast("링크 복사됨! 친구한테 공유해줘 💜"));
}
function shareToX() {
  if (!battleData) return;
  const votesA = battleData.votesA || 0, votesB = battleData.votesB || 0;
  const total = votesA + votesB;
  const pctA = total ? Math.round(votesA/total*100) : 50;
  const text = `⚔️ 팬덤배틀 이번 주 매치!\n${battleData.groupA} ${pctA}% vs ${battleData.groupB} ${100-pctA}%\n내 팀 응원하러 👉 ${location.href.split("?")[0]}`;
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(text), "_blank");
}

// ── 관리자 ──
function setupAdmin() {
  document.getElementById("adminPanel").style.display = "block";
  const selA = document.getElementById("adminGroupA");
  const selB = document.getElementById("adminGroupB");
  ALL_GROUPS.forEach(g => {
    selA.innerHTML += `<option value="${g}">${g}</option>`;
    selB.innerHTML += `<option value="${g}">${g}</option>`;
  });
  selB.selectedIndex = 1;

  // 기본 종료일: 7일 후
  const d = new Date(); d.setDate(d.getDate() + 7);
  document.getElementById("adminEndDate").value = d.toISOString().slice(0, 16);

  loadHistory();
}

async function adminSetBattle() {
  const groupA = document.getElementById("adminGroupA").value;
  const groupB = document.getElementById("adminGroupB").value;
  const endDate = document.getElementById("adminEndDate").value;
  if (groupA === groupB) { adminMsg("같은 그룹은 안 돼요!"); return; }
  if (!endDate) { adminMsg("종료 일시를 선택해주세요"); return; }

  // 현재 배틀을 역대 기록에 저장 + 전적 업데이트
  if (battleData && battleData.groupA) {
    const week = getWeekLabel();
    await db.ref("battle_history/" + week).set({ ...battleData, week });

    // 승패 기록 업데이트
    const winner = (battleData.votesA || 0) >= (battleData.votesB || 0) ? battleData.groupA : battleData.groupB;
    const loser  = winner === battleData.groupA ? battleData.groupB : battleData.groupA;
    const recSnap = await db.ref("group_records").once("value");
    const recs = recSnap.val() || {};
    const wRec = recs[winner] || { wins: 0, losses: 0 };
    const lRec = recs[loser]  || { wins: 0, losses: 0 };
    await db.ref("group_records/" + winner).set({ wins: (wRec.wins||0)+1, losses: wRec.losses||0 });
    await db.ref("group_records/" + loser ).set({ wins: lRec.wins||0, losses: (lRec.losses||0)+1 });
  }

  await db.ref("current_battle").set({ groupA, groupB, endDate, votesA: 0, votesB: 0, week: getWeekLabel() });
  await db.ref("next_vote").remove(); // 새 배틀 시작 시 다음 상대 투표 초기화

  // 랭킹에 새 그룹 없으면 0으로 초기화
  const snap = await db.ref("rankings").once("value");
  const existing = snap.val() || {};
  const updates = {};
  ALL_GROUPS.forEach(g => { if (!(g in existing)) updates[g] = 0; });
  if (Object.keys(updates).length) await db.ref("rankings").update(updates);

  adminMsg("✅ 새 배틀 시작됨!");
}

async function adminResetRankings() {
  if (!confirm("랭킹을 전부 초기화할까요?")) return;
  const updates = {};
  ALL_GROUPS.forEach(g => { updates[g] = 0; });
  await db.ref("rankings").set(updates);
  adminMsg("🔄 랭킹 초기화 완료");
}

function adminMsg(msg) { document.getElementById("adminMsg").textContent = msg; }
function getWeekLabel() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + "-W" + String(week).padStart(2, "0");
}

// ── 일일 응원 스탬프 ──
function getTodayStr() { return new Date().toISOString().slice(0,10); }
function getMyCheer() { return localStorage.getItem("cheered_" + getTodayStr()); }

function listenCheers() {
  const sel = document.getElementById("commentGroup");
  ALL_GROUPS.forEach(g => { sel.innerHTML += `<option value="${g}">${g}</option>`; });
  db.ref("cheers").on("value", snap => renderCheers(snap.val() || {}));
}

function renderCheers(data) {
  const grid = document.getElementById("cheerGrid");
  const myCheer = getMyCheer();
  const sorted = ALL_GROUPS.map(g => [g, data[g]||0]).sort((a,b) => b[1]-a[1]);
  grid.innerHTML = sorted.map(([g, cnt]) => {
    const meta = GROUP_META[g] || { emoji:"🌟", color:"#7c4dff" };
    const isMine = myCheer === g;
    return `<div class="cheer-item ${isMine?"cheered-today":""}">
      <div class="cheer-emoji">${meta.emoji}</div>
      <div class="cheer-name">${escHtml(g)}</div>
      <div class="cheer-count">${cnt.toLocaleString()}응원</div>
      <button class="cheer-btn ${isMine?"done":""}" onclick="cheer('${escAttr(g)}')" ${isMine?"disabled":""}>
        ${isMine ? "✅ 응원함" : "💪 응원"}
      </button>
    </div>`;
  }).join("");
}

function cheer(group) {
  const key = "cheered_" + getTodayStr();
  if (localStorage.getItem(key)) { showToast("오늘은 이미 응원했어요! 내일 또 와줘 💜"); return; }
  db.ref("cheers/" + group).transaction(c => (c||0)+1);
  localStorage.setItem(key, group);
  showToast("💪 " + group + " 응원 완료!");
}

// ── 응원 댓글 ──
const BAD = ["시발","씨발","병신","개새","지랄","fuck","shit","bitch"];
function filterBad(t) { return BAD.some(w => t.toLowerCase().includes(w)); }
function anonName() { return "팬#" + Math.floor(Math.random()*9000+1000); }

function listenComments() {
  db.ref("comments").limitToLast(30).on("value", snap => {
    const list = [];
    snap.forEach(c => list.push(c.val()));
    renderComments(list.reverse());
  });
}

function renderComments(list) {
  const el = document.getElementById("commentList");
  if (!list.length) { el.innerHTML = '<div style="text-align:center;padding:14px;color:var(--muted);font-size:.82rem">첫 번째 응원 댓글을 남겨봐! 🎤</div>'; return; }
  el.innerHTML = list.map(c => {
    const meta = GROUP_META[c.group] || { color:"#7c4dff" };
    const ago = relTimeComment(c.time);
    return `<div class="comment-item">
      <span class="comment-badge" style="background:${meta.color}22;color:${meta.color}">${escHtml(c.group)}</span>
      <div class="comment-body">
        <div class="comment-text">${escHtml(c.text)}</div>
        <div class="comment-meta">${escHtml(c.anon)} · ${ago}</div>
      </div>
    </div>`;
  }).join("");
}

function postComment() {
  const text = document.getElementById("commentInput").value.trim();
  const group = document.getElementById("commentGroup").value;
  if (!text) { showToast("응원 메시지를 입력해줘!"); return; }
  if (filterBad(text)) { showToast("부적절한 표현이 포함되어 있어요"); return; }
  if (!db) return;
  const ref = db.ref("comments").push();
  ref.set({ text, group, anon: anonName(), time: Date.now() });
  // 30개 초과 시 오래된 것 삭제
  db.ref("comments").once("value", snap => {
    const keys = []; snap.forEach(c => keys.push(c.key));
    if (keys.length > 30) keys.slice(0, keys.length-30).forEach(k => db.ref("comments/"+k).remove());
  });
  document.getElementById("commentInput").value = "";
  showToast("💬 응원 완료!");
}

function relTimeComment(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return "방금";
  if (s<3600) return Math.floor(s/60)+"분 전";
  if (s<86400) return Math.floor(s/3600)+"시간 전";
  return Math.floor(s/86400)+"일 전";
}

// ── 투표 인증 이미지 ──
function drawVoteProof(group) {
  const canvas = document.getElementById("proofCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const meta = GROUP_META[group] || { color:"#7c4dff", emoji:"🌟" };
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0d0d1a"); bg.addColorStop(1,meta.color+"44");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  ctx.textAlign = "center";
  ctx.font = "32px sans-serif"; ctx.fillText(meta.emoji, W/2, 52);
  ctx.fillStyle = meta.color; ctx.font = "bold 20px sans-serif";
  ctx.fillText("나는 오늘 " + group + "에 투표했어!", W/2, 86);
  ctx.fillStyle = "#ffffff55"; ctx.font = "13px sans-serif";
  ctx.fillText("팬덤배틀 · fandomkorea.github.io/fandom-battle", W/2, 112);
}

function downloadVoteProof(group) {
  const canvas = document.getElementById("proofCanvas");
  drawVoteProof(group);
  const a = document.createElement("a"); a.download = "투표인증.png";
  a.href = canvas.toDataURL("image/png"); a.click();
}

// ── 다음 배틀 예고 ──
function renderNextPrediction(nextVoteData) {
  const battleGroups = battleData ? [battleData.groupA, battleData.groupB] : [];
  const eligible = ALL_GROUPS.filter(g => !battleGroups.includes(g));
  const sorted = eligible.map(g => [g, nextVoteData[g]||0]).sort((a,b)=>b[1]-a[1]);
  const topNext = sorted[0]?.[0];
  if (!topNext || !battleData) return;
  const winnerLeading = (battleData.votesA||0) >= (battleData.votesB||0) ? battleData.groupA : battleData.groupB;
  const mA = GROUP_META[winnerLeading]||{emoji:"🌟"}, mB = GROUP_META[topNext]||{emoji:"🌟"};
  const el = document.getElementById("nextPreviewBanner");
  if (!el) return;
  el.innerHTML = `<div class="next-preview">
    <div>
      <div class="next-preview-label">📅 다음 배틀 예고</div>
      <div class="next-preview-match">${mA.emoji} ${escHtml(winnerLeading)} vs ${mB.emoji} ${escHtml(topNext)}</div>
      <div class="next-preview-sub">현재 투표 기준 예상 매치 · 결과에 따라 바뀔 수 있어요</div>
    </div>
  </div>`;
}

// ── 그룹 역대 전적 ──
let groupRecords = {};
function loadGroupRecords() {
  db.ref("group_records").once("value", snap => {
    groupRecords = snap.val() || {};
    if (allRankingsData) renderRankings(allRankingsData);
  });
}

// ── 유틸 ──
function fmtVotes(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, "") + "만";
  return n.toLocaleString();
}
function escHtml(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg;
  t.classList.add("show"); clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove("show"), 2500);
}

init();
